<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingwood Vietnam - 工业建模与智能制造平台</title>
    <style>
        :root {
            --primary-color: #005A9C;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #fff;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* Login Container */
        #login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
            transition: all 0.3s ease;
        }
        #login-container h2 {
            margin-bottom: 20px;
            color: var(--primary-color);
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #666;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #00447a;
        }
        
        /* Dashboard Container */
        #dashboard-container {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info {
            font-size: 14px;
        }
        .main-content {
            padding: 40px;
            flex-grow: 1;
            background-color: var(--bg-color);
        }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .module-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            border-top: 4px solid transparent;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .module-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }
        .module-card h3 {
            margin: 10px 0;
            color: #222;
        }
        .module-card p {
            font-size: 14px;
            color: #777;
        }
        .disabled-card {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .disabled-card:hover {
            transform: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-color: transparent;
        }
        .icon-placeholder {
            font-size: 40px;
            color: var(--primary-color);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- 登录界面 -->
    <div id="login-container">
        <h2>Kingwood 工业系统</h2>
        <p style="color: #888; font-size: 13px; margin-bottom: 25px;">系统认证</p>
        <div class="input-group">
            <label for="username">员工账号</label>
            <input type="text" id="username" placeholder="输入账号" value="admin">
        </div>
        <div class="input-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="输入密码" value="123456">
        </div>
        <button onclick="login()">登 录</button>
    </div>

    <!-- 模块选择大厅 -->
    <div id="dashboard-container">
        <header>
            <h2>Kingwood 智能制造与工程协作平台</h2>
            <div class="user-info">
                <span>欢迎您，<strong id="display-user">工程师</strong></span> | 
                <a href="#" onclick="logout()" style="color: #ddd; text-decoration: none; margin-left: 10px;">退出登录</a>
            </div>
        </header>
        <div class="main-content">
            <h3 style="margin-bottom: 30px; color: #444; max-width: 1200px; margin-left: auto; margin-right: auto;">请选择功能模块</h3>
            <div class="module-grid">
                <!-- 模块1：三视图转3D -->
                <div class="module-card" onclick="window.location.href='Great3D.html'">
                    <div class="icon-placeholder">🧊</div>
                    <h3>三视图转 3D 实体</h3>
                    <p>导入正交视图，基于描点求交算法自动生成水密性 STL 模型。</p>
                </div>

                <!-- 模块2：预留功能 -->
                <div class="module-card disabled-card" onclick="alert('该模块正在开发中，敬请期待！')">
                    <div class="icon-placeholder">⚙️</div>
                    <h3>工艺图谱分析</h3>
                    <p>基于 AI 视觉识别的 CAD 图纸标注自动提取系统。(预留)</p>
                </div>

                <!-- 模块3：预留功能 -->
                <div class="module-card disabled-card" onclick="alert('该模块正在开发中，敬请期待！')">
                    <div class="icon-placeholder">📊</div>
                    <h3>生产排期与报表</h3>
                    <p>联动车间设备数据与人员调度系统的可视化面板。(预留)</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            if(user.trim() !== '') {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'flex';
                document.getElementById('display-user').innerText = user;
            } else {
                alert('请输入账号');
            }
        }

        function logout() {
            document.getElementById('dashboard-container').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
        }
    </script>
</body>
</html>
