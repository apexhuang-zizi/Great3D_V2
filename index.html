<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX的工业工具 - 个人工作台</title>
    <style>
        :root { --primary-color: #deff9a; --bg-color: #0d0d0d; --card-bg: #1a1a1a; --text-color: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #login-container { background: var(--card-bg); padding: 45px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 380px; text-align: center; border: 1px solid #333; }
        h2 { margin-bottom: 10px; color: var(--primary-color); letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #888; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; border-radius: 8px; color: #fff; box-sizing: border-box; outline: none; }
        .input-group input:focus { border-color: var(--primary-color); }
        button { width: 100%; padding: 14px; background: var(--primary-color); color: #000; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: transform 0.2s; }
        button:hover { transform: scale(1.02); background: #c8f582; }
        
        #dashboard-container { display: none; width: 100%; height: 100vh; flex-direction: column; }
        header { background: #000; padding: 25px 50px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .main-content { padding: 60px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 100%; max-width: 1100px; }
        .module-card { background: var(--card-bg); border-radius: 15px; padding: 40px 30px; text-align: center; cursor: pointer; border: 1px solid #333; transition: all 0.3s; position: relative; overflow: hidden; }
        .module-card:hover { border-color: var(--primary-color); background: #222; transform: translateY(-5px); }
        .module-card h3 { color: #fff; margin: 15px 0 10px; }
        .module-card p { font-size: 14px; color: #888; line-height: 1.5; }
        .disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="login-container">
        <h2>APEX'S TOOLBOX</h2>
        <p style="color: #666; font-size: 12px; margin-bottom: 30px;">PERSONAL INDUSTRIAL SUITE</p>
        <div class="input-group">
            <label>ID</label>
            <input type="text" id="username" value="APEX">
        </div>
        <div class="input-group">
            <label>PASS</label>
            <input type="password" id="password" value="******">
        </div>
        <button onclick="login()">进入控制台</button>
    </div>

    <div id="dashboard-container">
        <header>
            <h2 style="margin:0; font-size: 20px;">APEX 工业套件</h2>
            <div style="font-size:13px; color:#666">PERSONAL USE ONLY | <a href="#" onclick="logout()" style="color:var(--primary-color); text-decoration:none">EXIT</a></div>
        </header>
        <div class="main-content">
            <div class="module-grid">
                <div class="module-card" onclick="window.location.href='Great3D.html'">
                    <div style="font-size:40px">🧊</div>
                    <h3>三视图建模</h3>
                    <p>导入正交工程图，通过手动描点实现高精度 3D 轮廓推导与布尔相交建模。</p>
                </div>
                <div class="module-card disabled">
                    <div style="font-size:40px">🔍</div>
                    <h3>标注识别 (待开发)</h3>
                    <p>利用计算机视觉技术自动提取图纸尺寸与标注数据。</p>
                </div>
                <div class="module-card disabled">
                    <div style="font-size:40px">📊</div>
                    <h3>工具看板 (预留)</h3>
                    <p>用于汇总个人开发流程与 3D 打印排期的可视化面板。</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        function login() { document.getElementById('login-container').style.display='none'; document.getElementById('dashboard-container').style.display='flex'; }
        function logout() { location.reload(); }
    </script>
</body>
</html>
