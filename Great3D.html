<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>APEX CAD ENGINE - PRO 装配版</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; display: flex; height: 100vh; background: #121212; color: #fff; }
        
        /* 左侧面板与折叠动画 */
        #left-panel { width: 480px; min-width: 480px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; position: relative; transition: margin-left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        #left-panel.collapsed { margin-left: -480px; }
        
        .panel-header { padding: 20px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        .top-settings { padding: 15px 20px; background: #0a0a0a; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .top-settings select { background: #222; color: #deff9a; border: 1px solid #444; padding: 6px; border-radius: 4px; outline: none; width: 100%; font-weight: bold; }
        
        .tabs { display: flex; background: #222; border-bottom: 1px solid #333; }
        .tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; font-size: 13px; color: #666; transition: 0.2s; }
        .tab.active { color: #deff9a; background: #1a1a1a; border-bottom: 2px solid #deff9a; }
        .tab-content { display: none; padding: 15px 20px; flex-grow: 1; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        .canvas-container { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px solid #333; position: relative; margin: 10px 0; display: flex; justify-content: center; align-items: center; border-radius: 8px; transition: all 0.3s; overflow: hidden; }
        .canvas-container.fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; border-radius: 0; border: none; margin: 0; background: #0a0a0a; }
        
        canvas { position: absolute; max-width: 100%; max-height: 100%; aspect-ratio: 1/1; z-index: 2; cursor: crosshair; }
        canvas.mode-select { cursor: default; }
        .bg-img { position: absolute; max-width: 100%; max-height: 100%; aspect-ratio: 1/1; object-fit: contain; opacity: 0.4; pointer-events: none; z-index: 1; }
        
        .max-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: #ccc; border: 1px solid #555; padding: 6px 10px; border-radius: 4px; cursor: pointer; z-index: 10; }
        .top-floating-tools { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .bottom-floating-tools { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #333; z-index: 10; }
        
        .btn { background: #deff9a; color: #000; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn:hover { background: #c8f582; }
        .btn-sec { background: #333; color: #ccc; }
        .btn-sec:hover { background: #444; color: #fff; }
        
        .mode-switch { display: flex; background: rgba(0,0,0,0.9); border-radius: 6px; overflow: hidden; border: 1px solid #444; width: fit-content; }
        .mode-switch label { padding: 8px 12px; cursor: pointer; font-size: 12px; color: #aaa; border-right: 1px solid #444; }
        .mode-switch label:last-child { border-right: none; }
        .mode-switch input[type="radio"] { display: none; }
        .mode-switch input[type="radio"]:checked + label { background: #deff9a; color: #000; font-weight: bold; }
        
        .param-box { background: rgba(0,0,0,0.9); padding: 8px 12px; border: 1px solid #444; border-radius: 6px; display: flex; gap: 8px; align-items: center; font-size: 12px; color: #ccc; }
        .param-box input { width: 45px; background: #222; color: #deff9a; border: 1px solid #555; text-align: center; border-radius: 4px; padding: 4px; outline:none; }
        
        .action-bar { padding: 20px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 12px; }
        .depth-input { background:#000; color:#deff9a; border:1px solid #444; padding:6px; border-radius: 4px; outline: none; }
        
        /* 3D 区域与装配面板 */
        #right-panel { flex-grow: 1; position: relative; background: #0d0d0d; }
        #loading { position: absolute; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:100; font-weight:bold; color: #deff9a; font-size: 20px; }
        
        /* 侧边折叠拨片 */
        #toggle-panel-btn { position: absolute; left: 0; top: 50%; transform: translateY(-50%); background: #222; color: #deff9a; border: 1px solid #444; border-left: none; padding: 20px 5px; cursor: pointer; z-index: 1000; border-radius: 0 8px 8px 0; font-size: 12px; text-align: center; box-shadow: 2px 0 10px rgba(0,0,0,0.5); transition: 0.2s; }
        #toggle-panel-btn:hover { background: #444; color: #fff; }

        /* 智能装配面板 (初始隐藏) */
        #scene-outliner { position: absolute; top: 20px; right: 20px; width: 300px; background: rgba(15,15,15,0.95); border: 1px solid #444; border-radius: 8px; z-index: 10; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .outliner-header { padding: 12px 15px; background: #222; border-bottom: 1px solid #444; font-weight: bold; font-size: 14px; color: #deff9a; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center; }
        
        .outliner-list { max-height: 200px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .outliner-item { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 8px 10px; border-radius: 4px; border: 1px solid #333; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .outliner-item:hover { border-color: #555; }
        .outliner-item.active { border-color: #deff9a; background: rgba(222,255,154,0.1); }
        .outliner-item input[type="checkbox"] { margin-right: 10px; cursor: pointer; }
        .item-name { flex-grow: 1; }
        
        /* 融合的尺寸侦测区域 */
        #dimension-section { display: none; flex-direction: column; padding: 12px; background: #111; border-top: 1px solid #333; font-family: monospace; color: #deff9a; font-size: 13px; }
        .dim-row { display: flex; justify-content: space-between; margin-top: 5px; }
        .dim-row span.val { color: #fff; font-weight: bold; }

        .transform-tools { display: flex; gap: 5px; padding: 10px; background: #1a1a1a; border-top: 1px solid #333; }
        .transform-tools button { flex: 1; padding: 8px; background: #333; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .transform-tools button.active { background: #deff9a; color: #000; font-weight: bold; }
        
        .boolean-tools { display: flex; flex-direction: column; gap: 8px; padding: 15px; background: #111; border-top: 1px solid #444; border-radius: 0 0 8px 8px; }
        .boolean-row { display: flex; gap: 8px; }
        .boolean-row button { flex: 1; padding: 10px; background: #444; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .boolean-row button:hover { background: #555; }
        .boolean-row button.b-union { border-left: 3px solid #4CAF50; }
        .boolean-row button.b-sub { border-left: 3px solid #F44336; }
        .boolean-row button.b-int { border-left: 3px solid #2196F3; }

        #btn-3d-undo { background: #555; border: 1px solid #666; color: #fff; border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        #btn-3d-undo:hover { background: #777; }
        #btn-3d-undo:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
                "three-csg-ts": "https://esm.sh/three-csg-ts@3.1.11?external=three"
            }
        }
    </script>
</head>
<body>
    <div id="left-panel">
        <div class="panel-header">
            <h3 style="margin:0; font-size:16px; color:#deff9a">APEX CAD ENGINE</h3>
            <a href="index.html" style="color:#666; text-decoration:none; font-size:12px">← BACK</a>
        </div>
        
        <div class="top-settings">
            <div style="font-size:12px; color:#aaa; margin-bottom: 5px;"><i style="color:#deff9a">●</i> 1. 选择生成策略 (从草图生成实体):</div>
            <select id="gen-strategy" onchange="toggleRevolveOptions()">
                <option value="intersect">三轴布尔交集 (需绘制三视图)</option>
                <option value="extrude">平面单向拉伸 (仅激活视图)</option>
                <option value="revolve">单轴中心旋转 (仅激活视图)</option>
            </select>
            <div id="revolve-axis-container" style="display:none; justify-content:space-between; align-items:center; font-size:12px; color:#aaa; margin-top: 5px;">
                <span>旋转中心轴:</span>
                <div class="mode-switch">
                    <input type="radio" name="r-axis" id="ra-x" value="X"><label for="ra-x">X 轴</label>
                    <input type="radio" name="r-axis" id="ra-y" value="Y" checked><label for="ra-y">Y 轴</label>
                    <input type="radio" name="r-axis" id="ra-z" value="Z"><label for="ra-z">Z 轴</label>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('front')">主视 (XY)</div>
            <div class="tab" onclick="switchTab('top')">俯视 (XZ)</div>
            <div class="tab" onclick="switchTab('side')">侧视 (YZ)</div>
        </div>
        
        <script>
            const views = ['front', 'top', 'side'];
            views.forEach((v, i) => {
                document.write(`
                <div id="tab-${v}" class="tab-content ${i===0?'active':''}">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 5px;">
                        <button class="btn btn-sec" onclick="document.getElementById('up-${v}').click()">📁 导入底图</button>
                        <input type="file" id="up-${v}" hidden onchange="loadImg(event, '${v}')">
                    </div>
                    <div class="canvas-container" id="container-${v}">
                        <button class="max-btn" onclick="toggleMax('${v}')">⛶</button>
                        <div class="top-floating-tools">
                            <div class="mode-switch">
                                <input type="radio" name="m-${v}" id="ms-${v}" value="select" checked onchange="setMode('${v}', 'select')"><label for="ms-${v}">↖ 选择</label>
                                <input type="radio" name="m-${v}" id="ml-${v}" value="line" onchange="setMode('${v}', 'line')"><label for="ml-${v}">线</label>
                                <input type="radio" name="m-${v}" id="mr-${v}" value="rect" onchange="setMode('${v}', 'rect')"><label for="mr-${v}">方</label>
                                <input type="radio" name="m-${v}" id="mc-${v}" value="circle" onchange="setMode('${v}', 'circle')"><label for="mc-${v}">圆</label>
                            </div>
                            <div id="p-rect-${v}" class="param-box" style="display:none">
                                W: <input type="number" id="rw-${v}" value="200" oninput="updateEntityParam('${v}')"> H: <input type="number" id="rh-${v}" value="200" oninput="updateEntityParam('${v}')">
                            </div>
                            <div id="p-circle-${v}" class="param-box" style="display:none">
                                R: <input type="number" id="cr-${v}" value="150" oninput="updateEntityParam('${v}')">
                            </div>
                        </div>
                        <img id="img-${v}" class="bg-img">
                        <canvas id="cv-${v}" class="mode-select" width="1000" height="1000"></canvas>
                        <div class="bottom-floating-tools">
                            <button class="btn btn-sec" onclick="undoPath('${v}')" id="btn-undo-${v}" style="display:none">↶ 撤销</button>
                            <button class="btn btn-sec" onclick="closePath('${v}')" id="btn-close-${v}" style="display:none; color:#deff9a;">✓ 闭合</button>
                            <button class="btn btn-sec" onclick="deleteSelected('${v}')" id="btn-del-${v}">🗑 删除 (Del)</button>
                            <button class="btn btn-sec" onclick="clearAll('${v}')">清空</button>
                        </div>
                    </div>
                </div>
                `);
            });
        </script>

        <div class="action-bar">
            <div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; color:#aaa">
                <span><i style="color:#deff9a">●</i> 2. 设定生成深度:</span>
                <input type="number" id="depth" class="depth-input" value="200" style="width:70px;">
            </div>
            <button class="btn" style="padding:15px; font-size:14px; margin-top:5px;" onclick="runBuild()">➕ 实例化实体至场景</button>
        </div>
    </div>
    
    <div id="right-panel">
        <div id="toggle-panel-btn" onclick="toggleLeftPanel()" title="收起/展开控制台">◀<br>收<br>起</div>
        <div id="loading">COMPUTING...</div>
        
        <div id="scene-outliner">
            <div class="outliner-header">
                <span id="part-count">0 个实体</span>
                <button id="btn-3d-undo" onclick="undo3D()" disabled title="回退上一次 3D 操作">↶ 回退</button>
            </div>
            <div class="outliner-list" id="outliner-list"></div>
            
            <div id="dimension-section">
                <div style="color:#888; font-size:11px; margin-bottom:4px;">[ 当前选中零件绝对尺寸 ]</div>
                <div style="display:flex; justify-content:space-between;">
                    <span>W(X): <span class="val" id="dim-w">0.0</span></span>
                    <span>H(Y): <span class="val" id="dim-h">0.0</span></span>
                    <span>D(Z): <span class="val" id="dim-d">0.0</span></span>
                </div>
            </div>

            <div class="transform-tools">
                <button id="t-translate" class="active" onclick="setTransformMode('translate')">移动 (W)</button>
                <button id="t-rotate" onclick="setTransformMode('rotate')">旋转 (E)</button>
                <button style="background:#552222; border-color:#882222;" onclick="delete3DPart()">删除选中</button>
            </div>
            <div class="boolean-tools">
                <div style="font-size:11px; color:#aaa; margin-bottom: 2px;">二次加工 (上层为被切主体，下层为刀具):</div>
                <div class="boolean-row">
                    <button class="b-union" onclick="execBoolean('union')">求和 ∪</button>
                    <button class="b-sub" onclick="execBoolean('subtract')" title="A 减去 B">求差 ➖</button>
                    <button class="b-int" onclick="execBoolean('intersect')">求交 ∩</button>
                </div>
                <button class="btn" style="width:100%; margin-top:5px; padding:10px;" onclick="exportSelectedSTL()">💾 导出选中实体 (STL)</button>
            </div>
        </div>

        <div id="viewport" style="width:100%; height:100%"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';
        import { CSG } from 'three-csg-ts';

        // -------------------------------------------------------------
        // 画布收放动画自适应处理
        // -------------------------------------------------------------
        window.toggleLeftPanel = () => {
            const lp = document.getElementById('left-panel');
            const btn = document.getElementById('toggle-panel-btn');
            lp.classList.toggle('collapsed');
            
            if(lp.classList.contains('collapsed')) {
                btn.innerHTML = '▶<br>展<br>开';
            } else {
                btn.innerHTML = '◀<br>收<br>起';
            }
            
            // 在动画期间高频触发 resize 保证 3D 画布平滑伸缩
            let steps = 0;
            const resizeInterval = setInterval(() => {
                window.dispatchEvent(new Event('resize'));
                steps++;
                if(steps > 16) clearInterval(resizeInterval); // 动画约 320ms
            }, 20);
        };

        // -------------------------------------------------------------
        // Canvas 2D 逻辑 
        // -------------------------------------------------------------
        const views = ['front', 'top', 'side'];
        const CV_SIZE = 1000; 
        const data = { 
            front: { entities: [], currentPath: [], mode: 'select', selectedId: null, tempArcEnd: null }, 
            top:   { entities: [], currentPath: [], mode: 'select', selectedId: null, tempArcEnd: null }, 
            side:  { entities: [], currentPath: [], mode: 'select', selectedId: null, tempArcEnd: null } 
        };
        let entityIdCounter = 0;

        window.switchTab = (v) => {
            document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${v}')"]`).classList.add('active');
            document.getElementById(`tab-${v}`).classList.add('active');
        };
        window.toggleMax = (v) => { document.getElementById(`container-${v}`).classList.toggle('fullscreen'); };
        window.toggleRevolveOptions = () => { document.getElementById('revolve-axis-container').style.display = document.getElementById('gen-strategy').value === 'revolve' ? 'flex' : 'none'; };

        window.setMode = (v, mode) => { 
            data[v].mode = mode; data[v].selectedId = null; data[v].currentPath = [];
            const cv = document.getElementById(`cv-${v}`); cv.className = mode === 'select' ? 'mode-select' : '';
            document.getElementById(`p-rect-${v}`).style.display = mode === 'rect' ? 'flex' : 'none';
            document.getElementById(`p-circle-${v}`).style.display = mode === 'circle' ? 'flex' : 'none';
            document.getElementById(`btn-undo-${v}`).style.display = mode === 'line' ? 'inline-block' : 'none';
            document.getElementById(`btn-close-${v}`).style.display = mode === 'line' ? 'inline-block' : 'none';
            document.getElementById(`btn-del-${v}`).style.display = mode === 'select' ? 'inline-block' : 'none';
            renderCanvas(v);
        };

        const renderCanvas = (v) => {
            const cv = document.getElementById(`cv-${v}`); const ctx = cv.getContext('2d');
            ctx.clearRect(0,0,CV_SIZE,CV_SIZE);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.beginPath(); 
            for(let i=0; i<=CV_SIZE; i+=50){ ctx.moveTo(i,0);ctx.lineTo(i,CV_SIZE);ctx.moveTo(0,i);ctx.lineTo(CV_SIZE,i); } ctx.stroke();
            ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(CV_SIZE/2,0);ctx.lineTo(CV_SIZE/2,CV_SIZE);ctx.moveTo(0,CV_SIZE/2);ctx.lineTo(CV_SIZE,CV_SIZE/2); ctx.stroke();

            data[v].entities.forEach(ent => {
                const isSelected = ent.id === data[v].selectedId;
                ctx.strokeStyle = isSelected ? '#ff9900' : '#deff9a'; ctx.lineWidth = isSelected ? 4 : 3;
                ctx.fillStyle = isSelected ? 'rgba(255, 153, 0, 0.2)' : 'rgba(222,255,154,0.1)';
                ctx.beginPath();
                if(ent.type === 'rect') ctx.rect(ent.cx - ent.w/2, ent.cy - ent.h/2, ent.w, ent.h);
                else if (ent.type === 'circle') ctx.arc(ent.cx, ent.cy, ent.r, 0, Math.PI*2);
                else if (ent.type === 'path') {
                    ctx.moveTo(ent.pts[0].cx, ent.pts[0].cy);
                    for(let i=1; i<ent.pts.length; i++) ctx.lineTo(ent.pts[i].cx, ent.pts[i].cy);
                    ctx.closePath();
                }
                ctx.fill(); ctx.stroke();
                if(isSelected) { ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ent.cx, ent.cy, 6, 0, Math.PI*2); ctx.fill(); }
            });

            if(data[v].currentPath.length > 0) {
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath();
                ctx.moveTo(data[v].currentPath[0].cx, data[v].currentPath[0].cy);
                for(let i=1; i<data[v].currentPath.length; i++) ctx.lineTo(data[v].currentPath[i].cx, data[v].currentPath[i].cy);
                ctx.stroke();
            }
        };

        const hitTest = (v, px, py) => {
            for (let i = data[v].entities.length - 1; i >= 0; i--) {
                const ent = data[v].entities[i];
                if (ent.type === 'circle' && Math.hypot(px - ent.cx, py - ent.cy) <= ent.r) return ent.id;
                if (ent.type === 'rect' && px >= ent.cx - ent.w/2 && px <= ent.cx + ent.w/2 && py >= ent.cy - ent.h/2 && py <= ent.cy + ent.h/2) return ent.id;
            }
            return null;
        };

        const getCanvasCoords = (v, e) => {
            const cv = document.getElementById(`cv-${v}`); const r = cv.getBoundingClientRect(); const scale = r.width / CV_SIZE; 
            return { cx: (e.clientX - r.left) / scale, cy: (e.clientY - r.top) / scale };
        };

        views.forEach(v => {
            const cv = document.getElementById(`cv-${v}`);
            let dragState = null;

            cv.addEventListener('keydown', (e) => { if ((e.key === 'Delete' || e.key === 'Backspace') && data[v].selectedId !== null) window.deleteSelected(v); });

            cv.addEventListener('mousedown', (e) => {
                cv.focus(); if(e.button !== 0) return;
                let { cx, cy } = getCanvasCoords(v, e);
                if (data[v].mode === 'select') {
                    const hitId = hitTest(v, cx, cy); data[v].selectedId = hitId;
                    if (hitId !== null) {
                        const ent = data[v].entities.find(e => e.id === hitId);
                        dragState = { ent, startX: cx, startY: cy, origCx: ent.cx, origCy: ent.cy };
                        if(ent.type === 'rect') { document.getElementById(`p-rect-${v}`).style.display = 'flex'; document.getElementById(`rw-${v}`).value = ent.w; document.getElementById(`rh-${v}`).value = ent.h; } 
                        else if(ent.type === 'circle') { document.getElementById(`p-circle-${v}`).style.display = 'flex'; document.getElementById(`cr-${v}`).value = ent.r; }
                    } else { document.getElementById(`p-rect-${v}`).style.display = 'none'; document.getElementById(`p-circle-${v}`).style.display = 'none'; }
                    renderCanvas(v);
                } 
                else {
                    if(data[v].mode === 'line' && data[v].currentPath.length > 0) {
                        const lastP = data[v].currentPath[data[v].currentPath.length - 1];
                        if (Math.abs(cx - lastP.cx) < 20) cx = lastP.cx; else if (Math.abs(cy - lastP.cy) < 20) cy = lastP.cy;
                    }
                    if(data[v].mode === 'rect') {
                        const w = parseFloat(document.getElementById(`rw-${v}`).value) || 100; const h = parseFloat(document.getElementById(`rh-${v}`).value) || 100;
                        data[v].entities.push({ id: ++entityIdCounter, type: 'rect', cx, cy, w, h });
                    } else if(data[v].mode === 'circle') {
                        const r = parseFloat(document.getElementById(`cr-${v}`).value) || 50;
                        data[v].entities.push({ id: ++entityIdCounter, type: 'circle', cx, cy, r });
                    } else if(data[v].mode === 'line') {
                        data[v].currentPath.push({ cx, cy });
                    }
                    renderCanvas(v);
                }
            });

            cv.addEventListener('mousemove', (e) => {
                if(data[v].mode === 'select' && dragState) {
                    let { cx, cy } = getCanvasCoords(v, e);
                    dragState.ent.cx = dragState.origCx + (cx - dragState.startX);
                    dragState.ent.cy = dragState.origCy + (cy - dragState.startY);
                    renderCanvas(v);
                }
            });
            cv.addEventListener('mouseup', () => { dragState = null; });
            
            cv.addEventListener('contextmenu', (e) => {
                e.preventDefault(); 
                if(data[v].mode !== 'line' || data[v].currentPath.length === 0) return;
                const lastP = data[v].currentPath[data[v].currentPath.length - 1];
                let { cx, cy } = getCanvasCoords(v, e);
                let dx = cx - lastP.cx, dy = cy - lastP.cy; const len = Math.sqrt(dx*dx + dy*dy); if(len === 0) return;
                dx /= len; dy /= len; 
                const distStr = prompt("输入线条长度 (mm):", "50");
                if(distStr && !isNaN(parseFloat(distStr))) { data[v].currentPath.push({ cx: lastP.cx + dx * parseFloat(distStr), cy: lastP.cy + dy * parseFloat(distStr) }); renderCanvas(v); }
            });

            window.undoPath = (vv) => { if(data[vv].currentPath.length > 0) { data[vv].currentPath.pop(); renderCanvas(vv); } };
            window.closePath = (vv) => { 
                if(data[vv].currentPath.length > 2) { 
                    let sumX=0, sumY=0; data[vv].currentPath.forEach(p=>{sumX+=p.cx; sumY+=p.cy;});
                    data[vv].entities.push({ id: ++entityIdCounter, type: 'path', cx: sumX/data[vv].currentPath.length, cy: sumY/data[vv].currentPath.length, pts: [...data[vv].currentPath] });
                    data[vv].currentPath = []; document.getElementById(`ms-${vv}`).click();
                } 
            };
            window.deleteSelected = (vv) => { if(data[vv].selectedId !== null) { data[vv].entities = data[vv].entities.filter(e => e.id !== data[vv].selectedId); data[vv].selectedId = null; renderCanvas(vv); } };
            window.clearAll = (vv) => { data[vv].entities = []; data[vv].currentPath = []; data[vv].selectedId = null; renderCanvas(vv); };
            window.updateEntityParam = (vv) => {
                const ent = data[vv].entities.find(e => e.id === data[vv].selectedId);
                if(ent) {
                    if(ent.type === 'rect') { ent.w = parseFloat(document.getElementById(`rw-${vv}`).value); ent.h = parseFloat(document.getElementById(`rh-${vv}`).value); } 
                    else if (ent.type === 'circle') ent.r = parseFloat(document.getElementById(`cr-${vv}`).value);
                    renderCanvas(vv);
                }
            };
            renderCanvas(v); 
        });

        // -------------------------------------------------------------
        // 3D 架构：场景、历史时光机、安全布尔运算
        // -------------------------------------------------------------
        const scene = new THREE.Scene(); 
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 5000);
        camera.position.set(800, 800, 800);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(document.getElementById('viewport').clientWidth, document.getElementById('viewport').clientHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        const tControls = new TransformControls(camera, renderer.domElement);
        
        tControls.addEventListener('dragging-changed', (e) => { 
            controls.enabled = !e.value; 
            if(!e.value) saveSceneState(); 
        });
        tControls.addEventListener('change', () => { updateHUD(); }); 
        scene.add(tControls);
        
        scene.add(new THREE.GridHelper(2000, 100, 0x222222, 0x111111));
        scene.add(new THREE.AxesHelper(500)); 
        scene.add(new THREE.DirectionalLight(0xffffff, 0.8)).position.set(200, 500, 200);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        const partsList = []; 
        let partCounter = 0;
        let selected3DPartId = null;

        const sceneHistory = [];
        const saveSceneState = () => {
            const state = partsList.map(p => ({ id: p.id, name: p.name, mesh: p.mesh.clone() }));
            sceneHistory.push(state);
            if(sceneHistory.length > 20) sceneHistory.shift(); 
            document.getElementById('btn-3d-undo').disabled = sceneHistory.length <= 1;
        };

        window.undo3D = () => {
            if(sceneHistory.length <= 1) return;
            sceneHistory.pop(); 
            const prevState = sceneHistory[sceneHistory.length - 1];
            
            partsList.forEach(p => scene.remove(p.mesh));
            partsList.length = 0;
            tControls.detach();
            selected3DPartId = null;
            document.getElementById('dimension-section').style.display = 'none';

            prevState.forEach(sp => {
                const restoredMesh = sp.mesh.clone();
                scene.add(restoredMesh);
                partsList.push({ id: sp.id, name: sp.name, mesh: restoredMesh });
            });
            refreshOutliner();
            document.getElementById('btn-3d-undo').disabled = sceneHistory.length <= 1;
        };

        saveSceneState();

        // ★ 核心UI控制：智能显示与隐藏
        const refreshOutliner = () => {
            const outlinerPanel = document.getElementById('scene-outliner');
            if (partsList.length === 0) {
                outlinerPanel.style.display = 'none';
                return;
            } else {
                outlinerPanel.style.display = 'flex';
            }

            const container = document.getElementById('outliner-list');
            container.innerHTML = '';
            document.getElementById('part-count').innerText = `${partsList.length} 个实体`;
            
            partsList.forEach(part => {
                const div = document.createElement('div');
                div.className = `outliner-item ${part.id === selected3DPartId ? 'active' : ''}`;
                
                const cb = document.createElement('input'); cb.type = 'checkbox'; cb.id = `cb-${part.id}`;
                cb.onclick = (e) => e.stopPropagation();

                const nameSpan = document.createElement('span');
                nameSpan.className = 'item-name'; nameSpan.innerText = part.name;

                div.appendChild(cb); div.appendChild(nameSpan);
                div.onclick = () => select3DPart(part.id);
                container.appendChild(div);
            });
        };

        const select3DPart = (id) => {
            selected3DPartId = id; 
            refreshOutliner();
            const part = partsList.find(p => p.id === id);
            if(part) { 
                tControls.attach(part.mesh); 
                document.getElementById('dimension-section').style.display = 'flex'; 
                updateHUD(); 
            } else { 
                tControls.detach(); 
                document.getElementById('dimension-section').style.display = 'none'; 
            }
        };

        const updateHUD = () => {
            if(!selected3DPartId) return;
            const part = partsList.find(p => p.id === selected3DPartId);
            part.mesh.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(part.mesh);
            const size = new THREE.Vector3(); box.getSize(size);
            document.getElementById('dim-w').innerText = size.x.toFixed(2);
            document.getElementById('dim-h').innerText = size.y.toFixed(2);
            document.getElementById('dim-d').innerText = size.z.toFixed(2);
        };

        window.setTransformMode = (mode) => {
            tControls.setMode(mode);
            document.getElementById('t-translate').className = mode === 'translate' ? 'active' : '';
            document.getElementById('t-rotate').className = mode === 'rotate' ? 'active' : '';
        };

        window.delete3DPart = () => {
            if(!selected3DPartId) return;
            const index = partsList.findIndex(p => p.id === selected3DPartId);
            scene.remove(partsList[index].mesh); tControls.detach(); partsList.splice(index, 1);
            selected3DPartId = null; document.getElementById('dimension-section').style.display = 'none';
            refreshOutliner();
            saveSceneState();
        };

        const getCheckedParts = () => partsList.filter(p => document.getElementById(`cb-${p.id}`)?.checked);

        window.execBoolean = (operation) => {
            const checked = getCheckedParts();
            if(checked.length !== 2) return alert("操作错误：请在列表中勾选【且仅勾选】 2 个实体进行布尔加工！");
            
            document.getElementById('loading').style.display = 'flex';
            setTimeout(() => {
                try {
                    saveSceneState();
                    const [partA, partB] = checked;
                    
                    partA.mesh.updateMatrixWorld(true); partB.mesh.updateMatrixWorld(true);
                    const csgA = CSG.fromMesh(partA.mesh, partA.mesh.matrixWorld);
                    const csgB = CSG.fromMesh(partB.mesh, partB.mesh.matrixWorld);
                    
                    let resultCSG;
                    if(operation === 'union') resultCSG = csgA.union(csgB);
                    else if(operation === 'subtract') resultCSG = csgA.subtract(csgB); 
                    else if(operation === 'intersect') resultCSG = csgA.intersect(csgB);
                    
                    if (!resultCSG || resultCSG.polygons.length === 0) {
                        throw new Error("模型重合导致零厚度崩溃或无接触。\n请稍微加长作为刀具的部件！");
                    }
                    
                    const mat = new THREE.MeshStandardMaterial({ color: 0x00aaff, roughness: 0.3, metalness: 0.4, side: THREE.DoubleSide });
                    const newMesh = CSG.toMesh(resultCSG, new THREE.Matrix4(), mat);
                    
                    const edge = new THREE.LineSegments(new THREE.EdgesGeometry(newMesh.geometry), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 }));
                    newMesh.add(edge);
                    
                    scene.remove(partA.mesh); scene.remove(partB.mesh);
                    partsList.splice(partsList.indexOf(partA), 1); partsList.splice(partsList.indexOf(partB), 1);
                    tControls.detach();
                    document.getElementById('dimension-section').style.display = 'none';
                    
                    const newId = `Part_${++partCounter}`;
                    partsList.push({ id: newId, name: `布尔组件_${newId}`, mesh: newMesh });
                    scene.add(newMesh);
                    
                    refreshOutliner();
                    select3DPart(newId);
                    saveSceneState(); 
                } catch(e) {
                    console.error(e); 
                    alert("布尔运算失败：\n" + (e.message || "拓扑结构冲突。"));
                    sceneHistory.pop();
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            }, 50);
        };

        // 画布图元到 3D 实体生成逻辑
        const tCoord = (c) => Math.round((c - CV_SIZE/2) * 10) / 10;
        const tCoordY = (c) => Math.round((CV_SIZE/2 - c) * 10) / 10;

        const buildViewCSG = (vData, depth) => {
            if(vData.entities.length === 0) return null;
            let unionCSG = null;
            const extSet = { depth: depth, bevelEnabled: false, curveSegments: 32 };
            vData.entities.forEach(ent => {
                const s = new THREE.Shape();
                if(ent.type === 'rect') {
                    const x = tCoord(ent.cx), y = tCoordY(ent.cy), w = Math.round(ent.w*10)/10, h = Math.round(ent.h*10)/10;
                    s.moveTo(x - w/2, y - h/2); s.lineTo(x + w/2, y - h/2); s.lineTo(x + w/2, y + h/2); s.lineTo(x - w/2, y + h/2); s.lineTo(x - w/2, y - h/2);
                } else if(ent.type === 'circle') {
                    s.absarc(tCoord(ent.cx), tCoordY(ent.cy), Math.round(ent.r*10)/10, 0, Math.PI * 2, false);
                } else if(ent.type === 'path') {
                    s.moveTo(tCoord(ent.pts[0].cx), tCoordY(ent.pts[0].cy));
                    for(let i=1; i<ent.pts.length; i++) s.lineTo(tCoord(ent.pts[i].cx), tCoordY(ent.pts[i].cy));
                    s.lineTo(tCoord(ent.pts[0].cx), tCoordY(ent.pts[0].cy));
                }
                const mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(s, extSet).translate(0,0,-depth/2));
                mesh.updateMatrix();
                unionCSG = unionCSG ? unionCSG.union(CSG.fromMesh(mesh)) : CSG.fromMesh(mesh);
            });
            return unionCSG;
        };

        window.runBuild = () => {
            const strategy = document.getElementById('gen-strategy').value;
            const activeV = document.querySelector('.tab-content.active').id.replace('tab-', '');
            const d = parseFloat(document.getElementById('depth').value);
            
            document.getElementById('loading').style.display = 'flex';
            
            setTimeout(() => {
                try {
                    const mat = new THREE.MeshStandardMaterial({ color: 0xdeff9a, roughness: 0.3, metalness: 0.5, side: THREE.DoubleSide });
                    let newMesh = null;

                    if (strategy === 'intersect') {
                        const csgF = buildViewCSG(data.front, d), csgT = buildViewCSG(data.top, d), csgS = buildViewCSG(data.side, d);
                        if(!csgF || !csgT || !csgS) throw new Error("交集需要三个视图都存在至少一个闭合实体！");
                        const mF = CSG.toMesh(csgF, new THREE.Matrix4(), mat); mF.updateMatrix();
                        const mT = CSG.toMesh(csgT, new THREE.Matrix4(), mat); mT.rotation.x = Math.PI/2; mT.updateMatrix();
                        const mS = CSG.toMesh(csgS, new THREE.Matrix4(), mat); mS.rotation.y = Math.PI/2; mS.updateMatrix();
                        let res = CSG.fromMesh(mF).intersect(CSG.fromMesh(mT)).intersect(CSG.fromMesh(mS));
                        newMesh = CSG.toMesh(res, new THREE.Matrix4(), mat);
                    } 
                    else if (strategy === 'extrude') {
                        const csgV = buildViewCSG(data[activeV], d);
                        if(!csgV) throw new Error("当前视图为空！");
                        newMesh = CSG.toMesh(csgV, new THREE.Matrix4(), mat);
                        if (activeV === 'top') newMesh.rotation.x = Math.PI/2;
                        if (activeV === 'side') newMesh.rotation.y = Math.PI/2;
                    } 
                    else if (strategy === 'revolve') {
                        if(data[activeV].entities.length === 0) throw new Error("当前视图为空！");
                        const ent = data[activeV].entities[0];
                        const s = new THREE.Shape();
                        if(ent.type === 'circle') s.absarc(tCoord(ent.cx), tCoordY(ent.cy), Math.round(ent.r*10)/10, 0, Math.PI * 2, false);
                        else if(ent.type === 'rect') { const x=tCoord(ent.cx), y=tCoordY(ent.cy), w=ent.w, h=ent.h; s.moveTo(x-w/2,y-h/2); s.lineTo(x+w/2,y-h/2); s.lineTo(x+w/2,y+h/2); s.lineTo(x-w/2,y+h/2); s.lineTo(x-w/2,y-h/2); }
                        else {
                            s.moveTo(tCoord(ent.pts[0].cx), tCoordY(ent.pts[0].cy));
                            for(let i=1; i<ent.pts.length; i++) s.lineTo(tCoord(ent.pts[i].cx), tCoordY(ent.pts[i].cy));
                        }
                        
                        const axis = document.querySelector('input[name="r-axis"]:checked').value;
                        const pts2D = s.getPoints(50);
                        let p3D = []; let rot = new THREE.Euler();
                        if (activeV === 'front') { 
                            if (axis === 'X') { p3D = pts2D.map(p => new THREE.Vector2(p.y, p.x)); rot.set(0, 0, -Math.PI/2); } 
                            else if (axis === 'Y') { p3D = pts2D.map(p => new THREE.Vector2(p.x, p.y)); rot.set(0, 0, 0); } 
                            else throw new Error("XY面图形只能绕X或Y轴旋转");
                        } else if (activeV === 'top') { 
                            if (axis === 'X') { p3D = pts2D.map(p => new THREE.Vector2(-p.y, p.x)); rot.set(0, 0, -Math.PI/2); } 
                            else if (axis === 'Z') { p3D = pts2D.map(p => new THREE.Vector2(p.x, -p.y)); rot.set(Math.PI/2, 0, 0); } 
                        } else if (activeV === 'side') { 
                            if (axis === 'Y') { p3D = pts2D.map(p => new THREE.Vector2(-p.x, p.y)); rot.set(0, 0, 0); } 
                            else if (axis === 'Z') { p3D = pts2D.map(p => new THREE.Vector2(p.y, -p.x)); rot.set(Math.PI/2, 0, 0); } 
                        }
                        newMesh = new THREE.Mesh(new THREE.LatheGeometry(p3D, 64), mat);
                        newMesh.rotation.copy(rot);
                    }

                    const edge = new THREE.LineSegments(new THREE.EdgesGeometry(newMesh.geometry), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 }));
                    newMesh.add(edge); 
                    
                    const newId = `Part_${++partCounter}`;
                    const strategyName = strategy === 'intersect' ? '交集件' : (strategy === 'extrude' ? '拉伸件' : '旋转件');
                    partsList.push({ id: newId, name: `${strategyName}_${newId}`, mesh: newMesh });
                    scene.add(newMesh);
                    refreshOutliner();
                    select3DPart(newId);
                    saveSceneState();
                    
                } catch(e) { 
                    console.error(e); alert(e.message || "生成失败。"); 
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            }, 50);
        };

        window.exportSelectedSTL = () => {
            if(!selected3DPartId) return alert("请先在列表中点击选中要导出的实体！");
            const part = partsList.find(p => p.id === selected3DPartId);
            const name = prompt("STL 文件名:", part.name);
            if(name) {
                const blob = new Blob([new STLExporter().parse(part.mesh)], { type: 'text/plain' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); 
                a.download = `${name}.stl`; a.click();
            }
        };

        function ani() { requestAnimationFrame(ani); controls.update(); renderer.render(scene, camera); }
        ani();
        window.onresize = () => {
            const w = document.getElementById('viewport').clientWidth, h = document.getElementById('viewport').clientHeight;
            camera.aspect = w/h; camera.updateProjectionMatrix(); renderer.setSize(w, h);
        };
    </script>
</body>
</html>
