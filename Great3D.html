<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>三视图生成 3D 实体 - 核心引擎测试</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; color: #fff; font-family: sans-serif; }
        #ui-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; z-index: 10; }
        button { background: #007acc; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        button:hover { background: #005999; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three-csg-ts": "https://esm.sh/three-csg-ts@3.1.11?external=three"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <h3>三视图 3D 构建器</h3>
        <p>1. 自动生成 主视、俯视、左视 二维轮廓</p>
        <p>2. 空间正交拉伸</p>
        <p>3. CSG 布尔交集运算</p>
        <button id="export-btn">导出为 STL 文件</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';
        import { CSG } from 'three-csg-ts';

        // ================= 1. 场景基础初始化 =================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2d2d2d);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(150, 150, 150);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        
        // 添加灯光与辅助线
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);
        scene.add(new THREE.AxesHelper(100)); // 红X, 绿Y, 蓝Z

        // ================= 2. 定义三视图二维轮廓 (Shape) =================
        const depth = 100; // 拉伸深度，必须足够大以完全穿透其他几何体

        // [主视图] - 绘制在 XY 平面上
        const frontShape = new THREE.Shape();
        frontShape.moveTo(-30, -30);
        frontShape.lineTo(30, -30);
        frontShape.lineTo(30, 0);
        frontShape.lineTo(0, 30); // 顶部尖角
        frontShape.lineTo(-30, 0);
        frontShape.lineTo(-30, -30);

        // [俯视图] - 最终需要放置在 XZ 平面上
        const topShape = new THREE.Shape();
        topShape.moveTo(-30, -30);
        topShape.lineTo(30, -30);
        topShape.lineTo(30, 30);
        topShape.lineTo(-30, 30);
        topShape.lineTo(-30, -30);

        // [侧视图] - 最终需要放置在 YZ 平面上
        const sideShape = new THREE.Shape();
        sideShape.moveTo(-30, -30);
        sideShape.lineTo(30, -30);
        sideShape.lineTo(30, 30);
        sideShape.lineTo(0, 30);
        sideShape.lineTo(0, 0);
        sideShape.lineTo(-30, 0);
        sideShape.lineTo(-30, -30);

        // ================= 3. 生成拉伸几何体 =================
        const extrudeSettings = { depth: depth, bevelEnabled: false };
        const frontGeo = new THREE.ExtrudeGeometry(frontShape, extrudeSettings);
        const topGeo = new THREE.ExtrudeGeometry(topShape, extrudeSettings);
        const sideGeo = new THREE.ExtrudeGeometry(sideShape, extrudeSettings);

        // 将几何体居中偏移，使拉伸的原点位于中心
        frontGeo.translate(0, 0, -depth / 2);
        topGeo.translate(0, 0, -depth / 2);
        sideGeo.translate(0, 0, -depth / 2);

        // ================= 4. 空间姿态对齐 (关键步骤) =================
        const frontMesh = new THREE.Mesh(frontGeo);
        // 主视图：本身就是沿 Z 轴拉伸，无需旋转

        const topMesh = new THREE.Mesh(topGeo);
        // 俯视图：需将平面的法线从 Z 轴旋转到 Y 轴 (放置在 XZ 面)
        topMesh.rotation.x = Math.PI / 2; 

        const sideMesh = new THREE.Mesh(sideGeo);
        // 侧视图：需将平面的法线从 Z 轴旋转到 X 轴 (放置在 YZ 面)
        sideMesh.rotation.y = Math.PI / 2; 

        // 更新世界矩阵以备 CSG 计算
        frontMesh.updateMatrix();
        topMesh.updateMatrix();
        sideMesh.updateMatrix();

        // ================= 5. CSG 布尔交集运算 =================
        // 求交公式: Entity = Front ∩ Top ∩ Side
        let resultCSG = CSG.fromMesh(frontMesh).intersect(CSG.fromMesh(topMesh));
        resultCSG = resultCSG.intersect(CSG.fromMesh(sideMesh));

        // 生成最终实体并应用材质
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88, 
            roughness: 0.4, 
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const finalMesh = CSG.toMesh(resultCSG, new THREE.Matrix4(), material);
        scene.add(finalMesh);

        // ================= 6. STL 导出逻辑 =================
        document.getElementById('export-btn').addEventListener('click', () => {
            const exporter = new STLExporter();
            const stlString = exporter.parse(scene);
            const blob = new Blob([stlString], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'generated_model.stl';
            link.click();
        });

        // 渲染循环
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
