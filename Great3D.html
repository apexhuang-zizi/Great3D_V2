<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>APEX的工业工具 - 三视图建模引擎</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; display: flex; height: 100vh; background: #121212; color: #fff; }
        #left-panel { width: 450px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; position: relative; transition: width 0.3s; }
        .panel-header { padding: 20px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: #222; border-bottom: 1px solid #333; }
        .tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; font-size: 13px; color: #666; transition: 0.2s; }
        .tab.active { color: #deff9a; background: #1a1a1a; border-bottom: 2px solid #deff9a; }
        .tab-content { display: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        .canvas-container { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px solid #333; position: relative; margin: 15px 0; display: flex; justify-content: center; align-items: center; border-radius: 8px; transition: all 0.3s; overflow: hidden; }
        .canvas-container.fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; border-radius: 0; border: none; margin: 0; background: #0a0a0a; }
        .canvas-container.fullscreen canvas, .canvas-container.fullscreen .bg-img { max-height: 95vh; max-width: 95vw; }
        
        canvas { position: absolute; max-width: 100%; max-height: 100%; aspect-ratio: 1/1; z-index: 2; cursor: crosshair; }
        .bg-img { position: absolute; max-width: 100%; max-height: 100%; aspect-ratio: 1/1; object-fit: contain; opacity: 0.4; pointer-events: none; z-index: 1; }
        
        .max-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: #ccc; border: 1px solid #555; padding: 6px 10px; border-radius: 4px; cursor: pointer; z-index: 10; font-size: 16px; }
        .max-btn:hover { background: #deff9a; color: #000; }
        
        .top-floating-tools { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .bottom-floating-tools { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #333; z-index: 10; }
        
        .btn { background: #deff9a; color: #000; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn:hover { background: #c8f582; }
        .btn-sec { background: #333; color: #ccc; }
        .btn-sec:hover { background: #444; color: #fff; }
        
        .mode-switch { display: flex; background: rgba(0,0,0,0.9); border-radius: 6px; overflow: hidden; border: 1px solid #444; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .mode-switch label { padding: 8px 12px; cursor: pointer; font-size: 12px; color: #aaa; transition: 0.2s; border-right: 1px solid #444; }
        .mode-switch label:last-child { border-right: none; }
        .mode-switch input[type="radio"] { display: none; }
        .mode-switch input[type="radio"]:checked + label { background: #deff9a; color: #000; font-weight: bold; }
        
        .param-box { background: rgba(0,0,0,0.9); padding: 8px 12px; border: 1px solid #444; border-radius: 6px; display: flex; gap: 8px; align-items: center; font-size: 12px; color: #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .param-box input { width: 40px; background: #222; color: #deff9a; border: 1px solid #555; text-align: center; border-radius: 4px; padding: 4px; }
        
        .action-bar { padding: 20px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 12px; }
        select, .depth-input { background:#000; color:#deff9a; border:1px solid #444; padding:6px; border-radius: 4px; outline: none; }
        
        #right-panel { flex-grow: 1; position: relative; }
        #loading { position: absolute; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:100; font-weight:bold; color: #deff9a; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
                "three-csg-ts": "https://esm.sh/three-csg-ts@3.1.11?external=three"
            }
        }
    </script>
</head>
<body>
    <div id="left-panel">
        <div class="panel-header">
            <h3 style="margin:0; font-size:16px; color:#deff9a">APEX 3D ENGINE</h3>
            <a href="index.html" style="color:#666; text-decoration:none; font-size:12px">← BACK</a>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('front')">主视 (XY)</div>
            <div class="tab" onclick="switchTab('top')">俯视 (XZ)</div>
            <div class="tab" onclick="switchTab('side')">侧视 (YZ)</div>
        </div>
        
        <script>
            const views = ['front', 'top', 'side'];
            views.forEach((v, i) => {
                document.write(`
                <div id="tab-${v}" class="tab-content ${i===0?'active':''}">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 5px;">
                        <button class="btn btn-sec" onclick="document.getElementById('up-${v}').click()">📁 导入底图 (Ctrl+V)</button>
                        <input type="file" id="up-${v}" hidden onchange="loadImg(event, '${v}')">
                    </div>
                    
                    <div class="canvas-container" id="container-${v}">
                        <button class="max-btn" onclick="toggleMax('${v}')" title="全屏/退出全屏">⛶</button>
                        
                        <div class="top-floating-tools">
                            <div class="mode-switch">
                                <input type="radio" name="m-${v}" id="ml-${v}" value="line" checked onchange="setMode('${v}', 'line')"><label for="ml-${v}">线段</label>
                                <input type="radio" name="m-${v}" id="ma-${v}" value="arc" onchange="setMode('${v}', 'arc')"><label for="ma-${v}">弧形</label>
                                <input type="radio" name="m-${v}" id="mr-${v}" value="rect" onchange="setMode('${v}', 'rect')"><label for="mr-${v}">方形</label>
                                <input type="radio" name="m-${v}" id="mc-${v}" value="circle" onchange="setMode('${v}', 'circle')"><label for="mc-${v}">圆形</label>
                            </div>
                            <div id="p-rect-${v}" class="param-box" style="display:none">
                                宽: <input type="number" id="rw-${v}" value="200"> 高: <input type="number" id="rh-${v}" value="200">
                            </div>
                            <div id="p-circle-${v}" class="param-box" style="display:none">
                                半径 (R): <input type="number" id="cr-${v}" value="150">
                            </div>
                        </div>

                        <img id="img-${v}" class="bg-img">
                        <canvas id="cv-${v}" width="1000" height="1000"></canvas>
                        
                        <div class="bottom-floating-tools">
                            <button class="btn btn-sec" onclick="undoPath('${v}')">↶ 退一步</button>
                            <button class="btn btn-sec" onclick="clearPath('${v}')">清空</button>
                            <button class="btn btn-sec" onclick="closePath('${v}')" style="color:#deff9a;">✓ 闭合路径</button>
                        </div>
                    </div>
                </div>
                `);
            });
        </script>

        <div class="action-bar">
            <div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; color:#aaa">
                <span><i style="color:#deff9a">●</i> 生成路径:</span>
                <select id="gen-strategy" onchange="toggleRevolveOptions()">
                    <option value="intersect">三轴布尔交集 (需三视图闭合)</option>
                    <option value="extrude">平面单向拉伸 (仅当前视图)</option>
                    <option value="revolve">单轴旋转 (仅当前视图)</option>
                </select>
            </div>
            
            <div id="revolve-axis-container" style="display:none; justify-content:space-between; align-items:center; font-size:12px; color:#aaa;">
                <span><i style="color:#deff9a">●</i> 旋转中心轴:</span>
                <div class="mode-switch">
                    <input type="radio" name="r-axis" id="ra-x" value="X"><label for="ra-x">X 轴</label>
                    <input type="radio" name="r-axis" id="ra-y" value="Y" checked><label for="ra-y">Y 轴</label>
                    <input type="radio" name="r-axis" id="ra-z" value="Z"><label for="ra-z">Z 轴</label>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; color:#aaa">
                <span><i style="color:#deff9a">●</i> 拉伸深度(Z轴):</span>
                <input type="number" id="depth" class="depth-input" value="600" style="width:70px;">
            </div>
            <button class="btn" style="padding:15px; font-size:14px; margin-top:5px;" onclick="runBuild()">执行生成引擎 ⚡</button>
            <button class="btn btn-sec" style="padding:12px" onclick="exportSTL()">导出 STL 模型</button>
        </div>
    </div>
    
    <div id="right-panel"><div id="loading">COMPUTING...</div><div id="viewport" style="width:100%; height:100%"></div></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';
        import { CSG } from 'three-csg-ts';

        const views = ['front', 'top', 'side'];
        const data = { 
            front: { pts: [], done: false, mode: 'line', arcState: 0, tempArcEnd: null }, 
            top: { pts: [], done: false, mode: 'line', arcState: 0, tempArcEnd: null }, 
            side: { pts: [], done: false, mode: 'line', arcState: 0, tempArcEnd: null } 
        };
        const CV_SIZE = 1000; 

        // UI 控制
        window.switchTab = (v) => {
            document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${v}')"]`).classList.add('active');
            document.getElementById(`tab-${v}`).classList.add('active');
        };
        window.toggleMax = (v) => { document.getElementById(`container-${v}`).classList.toggle('fullscreen'); };
        window.setMode = (v, mode) => { 
            data[v].mode = mode; data[v].arcState = 0; 
            document.getElementById(`p-rect-${v}`).style.display = mode === 'rect' ? 'flex' : 'none';
            document.getElementById(`p-circle-${v}`).style.display = mode === 'circle' ? 'flex' : 'none';
        };
        window.toggleRevolveOptions = () => {
            const isRevolve = document.getElementById('gen-strategy').value === 'revolve';
            document.getElementById('revolve-axis-container').style.display = isRevolve ? 'flex' : 'none';
        };

        const handleImgBlob = (blob, v) => {
            const img = document.getElementById(`img-${v}`);
            img.src = URL.createObjectURL(blob); img.style.display = 'block';
        };
        window.loadImg = (e, v) => { if(e.target.files[0]) handleImgBlob(e.target.files[0], v); };
        window.addEventListener('paste', (e) => {
            const activeTab = document.querySelector('.tab-content.active');
            if(!activeTab) return;
            const v = activeTab.id.replace('tab-', '');
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i of items) if (i.type.startsWith('image/')) { handleImgBlob(i.getAsFile(), v); break; }
        });

        // 核心画布引擎
        views.forEach(v => {
            const cv = document.getElementById(`cv-${v}`);
            const ctx = cv.getContext('2d');
            let mousePos = null; 

            const render = () => {
                ctx.clearRect(0,0,CV_SIZE,CV_SIZE);
                ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.beginPath(); 
                for(let i=0; i<=CV_SIZE; i+=50){ ctx.moveTo(i,0);ctx.lineTo(i,CV_SIZE);ctx.moveTo(0,i);ctx.lineTo(CV_SIZE,i); } ctx.stroke();
                
                ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(CV_SIZE/2,0);ctx.lineTo(CV_SIZE/2,CV_SIZE);ctx.moveTo(0,CV_SIZE/2);ctx.lineTo(CV_SIZE,CV_SIZE/2); ctx.stroke();
                
                ctx.fillStyle = '#666'; ctx.font = '12px sans-serif';
                for(let i=0; i<=CV_SIZE; i+=100) {
                    if(i !== CV_SIZE/2) {
                        ctx.fillText((i - CV_SIZE/2), i + 4, CV_SIZE/2 - 4); 
                        ctx.fillText((CV_SIZE/2 - i), CV_SIZE/2 + 4, i - 4); 
                    }
                }
                ctx.fillStyle = 'rgba(222,255,154,0.7)'; ctx.font = '16px sans-serif'; ctx.fontWeight = 'bold';
                ctx.fillText("网格间距: 50mm", 15, 75);
                
                const pts = data[v].pts;
                if(pts.length > 0) {
                    ctx.strokeStyle = '#deff9a'; ctx.lineWidth = 4; ctx.beginPath();
                    if(pts[0].type === 'rect') {
                        ctx.rect(pts[0].cx - pts[0].w/2, pts[0].cy - pts[0].h/2, pts[0].w, pts[0].h);
                        if(data[v].done) { ctx.fillStyle = 'rgba(222,255,154,0.15)'; ctx.fill(); }
                        ctx.stroke();
                    } else if (pts[0].type === 'circle') {
                        ctx.arc(pts[0].cx, pts[0].cy, pts[0].r, 0, Math.PI*2);
                        if(data[v].done) { ctx.fillStyle = 'rgba(222,255,154,0.15)'; ctx.fill(); }
                        ctx.stroke();
                    } else {
                        ctx.moveTo(pts[0].cx, pts[0].cy);
                        for(let i=1; i<pts.length; i++) {
                            if(pts[i].type === 'arc') ctx.quadraticCurveTo(pts[i].cpx, pts[i].cpy, pts[i].cx, pts[i].cy);
                            else ctx.lineTo(pts[i].cx, pts[i].cy);
                        }
                        if(data[v].done) { ctx.lineTo(pts[0].cx, pts[0].cy); ctx.fillStyle = 'rgba(222,255,154,0.15)'; ctx.fill(); }
                        ctx.stroke();
                        pts.forEach((p, index) => { 
                            ctx.fillStyle = index === 0 ? '#ff4444' : '#fff'; 
                            ctx.beginPath(); ctx.arc(p.cx, p.cy, 6, 0, Math.PI*2); ctx.fill(); 
                        });
                    }
                }

                if(!data[v].done && mousePos && (data[v].mode === 'line' || data[v].mode === 'arc') && pts.length > 0 && pts[0].type !== 'rect' && pts[0].type !== 'circle') {
                    const lastP = pts[pts.length-1];
                    if(data[v].mode === 'line') {
                        ctx.beginPath(); ctx.moveTo(lastP.cx, lastP.cy); ctx.lineTo(mousePos.cx, mousePos.cy);
                        if(mousePos.snapped) {
                            ctx.strokeStyle = '#00ffff'; ctx.setLineDash([]); ctx.stroke();
                            ctx.fillStyle = '#00ffff'; ctx.font = "24px sans-serif";
                            ctx.fillText(mousePos.snapped === 'h' ? ' —— 水平' : ' | 垂直', mousePos.cx + 15, mousePos.cy);
                        } else {
                            ctx.strokeStyle = '#ffcc00'; ctx.setLineDash([10, 10]); ctx.stroke(); ctx.setLineDash([]);
                        }
                    } else if (data[v].mode === 'arc') {
                        if(data[v].arcState === 0) {
                            ctx.beginPath(); ctx.moveTo(lastP.cx, lastP.cy); ctx.lineTo(mousePos.cx, mousePos.cy);
                            ctx.strokeStyle = '#ffcc00'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
                        } else if (data[v].arcState === 1 && data[v].tempArcEnd) {
                            ctx.beginPath(); ctx.moveTo(lastP.cx, lastP.cy);
                            ctx.quadraticCurveTo(mousePos.cx, mousePos.cy, data[v].tempArcEnd.cx, data[v].tempArcEnd.cy);
                            ctx.strokeStyle = '#00ffff'; ctx.setLineDash([]); ctx.stroke();
                        }
                    }
                }
            };

            const getCanvasCoords = (e) => {
                const r = cv.getBoundingClientRect();
                const scale = r.width / CV_SIZE; 
                return { cx: (e.clientX - r.left) / scale, cy: (e.clientY - r.top) / scale };
            };

            cv.addEventListener('mousemove', (e) => {
                if(data[v].done) return;
                let { cx, cy } = getCanvasCoords(e);
                let snapped = false;

                if(data[v].mode === 'line' || (data[v].mode === 'arc' && data[v].arcState === 0)) {
                    if(data[v].pts.length > 0 && data[v].pts[0].type !== 'rect' && data[v].pts[0].type !== 'circle') {
                        const lastP = data[v].pts[data[v].pts.length - 1];
                        if (Math.abs(cx - lastP.cx) < 20) { cx = lastP.cx; snapped = 'v'; }
                        else if (Math.abs(cy - lastP.cy) < 20) { cy = lastP.cy; snapped = 'h'; }
                    }
                }
                mousePos = { cx, cy, snapped };
                render();
            });

            cv.addEventListener('mouseout', () => { mousePos = null; render(); });

            cv.addEventListener('click', (e) => {
                if(data[v].done) return;
                let { cx, cy } = mousePos ? mousePos : getCanvasCoords(e);
                const x = cx - CV_SIZE/2, y = CV_SIZE/2 - cy; 

                if(data[v].mode === 'rect') {
                    const w = parseFloat(document.getElementById(`rw-${v}`).value) || 100;
                    const h = parseFloat(document.getElementById(`rh-${v}`).value) || 100;
                    data[v].pts = [{ type: 'rect', cx, cy, x, y, w, h }]; data[v].done = true;
                } else if(data[v].mode === 'circle') {
                    const r = parseFloat(document.getElementById(`cr-${v}`).value) || 50;
                    data[v].pts = [{ type: 'circle', cx, cy, x, y, r }]; data[v].done = true;
                } else {
                    if(data[v].pts.length === 0) {
                        data[v].pts.push({ type: 'start', cx, cy, x, y });
                    } else {
                        if (data[v].mode === 'line') {
                            data[v].pts.push({ type: 'line', cx, cy, x, y });
                        } else if (data[v].mode === 'arc') {
                            if (data[v].arcState === 0) {
                                data[v].tempArcEnd = { cx, cy, x, y }; data[v].arcState = 1;
                            } else {
                                data[v].pts.push({ type: 'arc', cx: data[v].tempArcEnd.cx, cy: data[v].tempArcEnd.cy, x: data[v].tempArcEnd.x, y: data[v].tempArcEnd.y, cpx: cx, cpy: cy, cpx_three: x, cpy_three: y });
                                data[v].arcState = 0; data[v].tempArcEnd = null;
                            }
                        }
                    }
                }
                render();
            });

            window.undoPath = (vv) => { 
                if(!data[vv].done && data[vv].pts.length > 0) { 
                    if(data[vv].arcState === 1) { data[vv].arcState = 0; data[vv].tempArcEnd = null; } 
                    else { data[vv].pts.pop(); } render(); 
                } 
            };
            window.clearPath = (vv) => { data[vv].pts = []; data[vv].done = false; data[vv].arcState = 0; render(); };
            window.closePath = (vv) => { if(data[vv].pts.length > 2) { data[vv].done = true; render(); } };
            
            render();
        });

        // ================= Three.js 核心 3D 管线 =================
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0d0d0d);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 5000);
        camera.position.set(800, 800, 800);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(document.getElementById('viewport').clientWidth, document.getElementById('viewport').clientHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        
        // 强化轴心视觉辅助：红X，绿Y，蓝Z
        scene.add(new THREE.GridHelper(2000, 100, 0x222222, 0x111111));
        scene.add(new THREE.AxesHelper(500)); 
        
        const light = new THREE.DirectionalLight(0xffffff, 0.8); light.position.set(200, 500, 200); scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        let mesh = null;

        const makeShape = (pts) => {
            const s = new THREE.Shape();
            if(pts[0].type === 'rect') {
                const w = pts[0].w, h = pts[0].h, x = pts[0].x, y = pts[0].y;
                s.moveTo(x - w/2, y - h/2); s.lineTo(x + w/2, y - h/2);
                s.lineTo(x + w/2, y + h/2); s.lineTo(x - w/2, y + h/2); s.lineTo(x - w/2, y - h/2);
            } 
            else if(pts[0].type === 'circle') {
                s.absarc(pts[0].x, pts[0].y, pts[0].r, 0, Math.PI * 2, false);
            } 
            else {
                s.moveTo(pts[0].x, pts[0].y);
                for(let i=1; i<pts.length; i++) {
                    if(pts[i].type === 'arc') s.quadraticCurveTo(pts[i].cpx_three, pts[i].cpy_three, pts[i].x, pts[i].y);
                    else s.lineTo(pts[i].x, pts[i].y);
                }
                s.lineTo(pts[0].x, pts[0].y);
            }
            return s;
        };

        window.runBuild = () => {
            const strategy = document.getElementById('gen-strategy').value;
            const activeV = document.querySelector('.tab-content.active').id.replace('tab-', '');
            const d = parseFloat(document.getElementById('depth').value);
            
            document.getElementById('loading').style.display = 'flex';
            
            setTimeout(() => {
                try {
                    if(mesh) scene.remove(mesh);
                    const mat = new THREE.MeshStandardMaterial({ color: 0xdeff9a, roughness: 0.3, metalness: 0.5, side: THREE.DoubleSide });
                    const extSet = { depth: d, bevelEnabled: false, curveSegments: 64 };

                    if (strategy === 'intersect') {
                        if(!data.front.done || !data.top.done || !data.side.done) throw new Error("三轴交集需要主、俯、侧三个视图均闭合！");
                        const mF = new THREE.Mesh(new THREE.ExtrudeGeometry(makeShape(data.front.pts), extSet).translate(0,0,-d/2));
                        const mT = new THREE.Mesh(new THREE.ExtrudeGeometry(makeShape(data.top.pts), extSet).translate(0,0,-d/2));
                        const mS = new THREE.Mesh(new THREE.ExtrudeGeometry(makeShape(data.side.pts), extSet).translate(0,0,-d/2));
                        mT.rotation.x = Math.PI/2; mS.rotation.y = Math.PI/2;
                        [mF, mT, mS].forEach(m => m.updateMatrix());
                        
                        let res = CSG.fromMesh(mF).intersect(CSG.fromMesh(mT));
                        mesh = CSG.toMesh(res.intersect(CSG.fromMesh(mS)), new THREE.Matrix4(), mat);
                    } 
                    else if (strategy === 'extrude') {
                        if(!data[activeV].done) throw new Error("当前视图未闭合！");
                        mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(makeShape(data[activeV].pts), extSet).translate(0,0,-d/2), mat);
                        // 根据视图放置到正确的空间位置
                        if (activeV === 'top') mesh.rotation.x = Math.PI/2;
                        if (activeV === 'side') mesh.rotation.y = Math.PI/2;
                    } 
                    else if (strategy === 'revolve') {
                        if(!data[activeV].done) throw new Error("当前视图未闭合！");
                        const axis = document.querySelector('input[name="r-axis"]:checked').value;
                        const activePts = makeShape(data[activeV].pts).getPoints(100);
                        
                        let points2D = [];
                        let latheRot = new THREE.Euler();

                        // 核心：视图与世界坐标旋转轴的映射逻辑
                        if (activeV === 'front') { 
                            if (axis === 'X') { points2D = activePts.map(p => new THREE.Vector2(p.y, p.x)); latheRot.set(0, 0, -Math.PI/2); } 
                            else if (axis === 'Y') { points2D = activePts.map(p => new THREE.Vector2(p.x, p.y)); latheRot.set(0, 0, 0); } 
                            else throw new Error("几何约束：主视图(XY)平面的图形只能围绕共面的 X 轴或 Y 轴旋转。");
                        }
                        else if (activeV === 'top') { 
                            if (axis === 'X') { points2D = activePts.map(p => new THREE.Vector2(-p.y, p.x)); latheRot.set(0, 0, -Math.PI/2); } 
                            else if (axis === 'Z') { points2D = activePts.map(p => new THREE.Vector2(p.x, -p.y)); latheRot.set(Math.PI/2, 0, 0); } 
                            else throw new Error("几何约束：俯视图(XZ)平面的图形只能围绕共面的 X 轴或 Z 轴旋转。");
                        }
                        else if (activeV === 'side') { 
                            if (axis === 'Y') { points2D = activePts.map(p => new THREE.Vector2(-p.x, p.y)); latheRot.set(0, 0, 0); } 
                            else if (axis === 'Z') { points2D = activePts.map(p => new THREE.Vector2(p.y, -p.x)); latheRot.set(Math.PI/2, 0, 0); } 
                            else throw new Error("几何约束：侧视图(YZ)平面的图形只能围绕共面的 Y 轴或 Z 轴旋转。");
                        }

                        mesh = new THREE.Mesh(new THREE.LatheGeometry(points2D, 64), mat);
                        mesh.rotation.copy(latheRot);
                    }

                    const edge = new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 }));
                    mesh.add(edge); scene.add(mesh);
                    
                } catch(e) { 
                    console.error(e); 
                    alert(e.message || "生成失败，请检查点位是否自交叉或路径未闭合。"); 
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            }, 50);
        };

        window.exportSTL = () => {
            if(!mesh) return alert("请先执行生成引擎构建模型！");
            const blob = new Blob([new STLExporter().parse(mesh)], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `APEX_PART_${Date.now()}.stl`; a.click();
        };

        function ani() { requestAnimationFrame(ani); controls.update(); renderer.render(scene, camera); }
        ani();
        window.onresize = () => {
            const w = document.getElementById('viewport').clientWidth, h = document.getElementById('viewport').clientHeight;
            camera.aspect = w/h; camera.updateProjectionMatrix(); renderer.setSize(w, h);
        };
    </script>
</body>
</html>
