<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>APEX CAD ENGINE - 工业级满血全量版</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; display: flex; height: 100vh; background: #121212; color: #fff; flex-direction: row; }
        #left-panel { flex: 0 0 480px; width: 480px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; position: relative; transition: margin-left 0.3s; }
        #left-panel.collapsed { margin-left: -480px; }
        .panel-header { padding: 20px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .top-settings { padding: 15px 20px; background: #0a0a0a; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .top-settings select { background: #222; color: #deff9a; border: 1px solid #444; padding: 8px; border-radius: 4px; outline: none; width: 100%; font-weight: bold; }
        .tabs-header { display: flex; background: #050505; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: #888; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #deff9a; border-bottom: 2px solid #deff9a; background: #1a1a1a; }
        .tab-content { display: none; flex-grow: 1; position: relative; overflow: hidden; background: #151515; }
        .tab-content.active { display: block; }
        .canvas-container { position: relative; width: 100%; height: 100%; cursor: crosshair; }
        .bg-img { position: absolute; top: 0; left: 0; pointer-events: none; opacity: 0.4; transform-origin: 0 0; }
        .draw-cv { position: absolute; top: 0; left: 0; background: transparent; width: 100%; height: 100%; }
        .top-floating-tools { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; flex-direction: column; gap: 6px; z-index: 50; }
        .tool-row { display: flex; gap: 6px; align-items: center; width: 100%; flex-wrap: wrap; }
        .mode-switch { display: flex; background: rgba(10,10,10,0.85); border: 1px solid #444; padding: 4px; border-radius: 6px; backdrop-filter: blur(8px); }
        .mode-switch input { display: none; }
        .mode-switch label { padding: 6px 12px; font-size: 11px; font-weight: bold; color: #aaa; cursor: pointer; border-radius: 4px; }
        .mode-switch input:checked + label { background: #deff9a; color: #111; }
        .param-box { background: rgba(10,10,10,0.85); border: 1px solid #444; padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #ccc; }
        .param-box input { width: 45px; background: #252525; border: 1px solid #555; color: #deff9a; padding: 4px; border-radius: 4px; text-align: center; outline: none; }
        .bottom-actions { padding: 15px 20px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .btn { background: #deff9a; color: #111; font-weight: bold; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn:hover { background: #fff; }
        .btn-sec { background: #2a2a2a; color: #ccc; border: 1px solid #444; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-sec:hover, .btn-sec.active { background: #deff9a; color: #000; }
        #center-viewport { flex-grow: 1; height: 100vh; background: #16161a; position: relative; }
        #toggle-panel-btn { position: absolute; left: 0; top: 50%; transform: translateY(-50%); background: #222; border: 1px solid #444; border-left: none; color: #deff9a; width: 16px; height: 60px; line-height: 60px; text-align: center; cursor: pointer; z-index: 100; font-size: 12px; border-radius: 0 6px 6px 0; }
        #view-cube { position: absolute; top: 20px; right: 20px; background: rgba(20,20,20,0.7); border: 1px solid #444; display: flex; gap: 4px; padding: 4px; border-radius: 6px; z-index: 50; }
        .cube-face { background: #2a2a2a; border: 1px solid #555; color: #aaa; font-size: 10px; padding: 6px 10px; cursor: pointer; border-radius: 4px; }
        #viewport-hints { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 4px; font-size: 11px; color: #aaa; pointer-events: none; }
        #right-panel { flex: 0 0 320px; width: 320px; background: #1a1a1a; border-left: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .outliner-header { padding: 15px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .outliner-list { display: flex; flex-direction: column; gap: 4px; padding: 5px 10px; max-height: 200px; overflow-y: auto; }
        .outliner-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #222; border: 1px solid #333; border-radius: 4px; cursor: pointer; transition: 0.15s; user-select: none; }
        .outliner-item.active { background: rgba(0,170,255,0.15); border-color: #00aaff; }
        .dim-row { display: flex; justify-content: space-between; width: 100%; color: #aaa; font-size: 11px; }
        .dim-row .val { color: #deff9a; font-family: monospace; font-weight: bold; }
        .boolean-row { display: flex; gap: 6px; width: 100%; }
        .boolean-row button { flex: 1; padding: 10px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; color: #fff; background: #333;}
        #loading { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 10000; display: none; justify-content: center; align-items: center; flex-direction: column; color: #deff9a; font-weight: bold;}
        .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top-color: #deff9a; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        details summary { outline: none; user-select: none; padding: 10px 15px; background: #1c1c1c; font-size: 12px; font-weight: bold; color: #deff9a; cursor: pointer; }
    </style>
    <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.147.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://unpkg.com/three-csg-ts@3.1.10/dist/bundle.umd.js"></script>
</head>
<body>
    <div id="loading"><div class="spinner"></div><div id="loading-text">多线程布尔拓扑计算中...</div></div>

    <div id="left-panel">
        <div class="panel-header">
            <span style="font-weight: bold; font-size: 15px;">APEX CAD ENGINE</span>
            <span style="font-size: 10px; background: #252525; padding: 4px 8px; border-radius: 4px;">V3.0 FULL</span>
        </div>
        <div class="top-settings">
            <select id="gen-strategy" onchange="toggleRevolveOptions()">
                <option value="intersect">三轴布尔交集 (需绘制三视图)</option>
                <option value="extrude">平面单向拉伸 (仅激活视图)</option>
                <option value="revolve">单轴中心旋转 (仅激活视图)</option>
                <option value="sweep" style="color: #ff9900;">沿路径扫掠 (主视画截面, 侧视画路径)</option>
            </select>
            <div id="revolve-axis-box" style="display: none; align-items: center; gap: 15px; background: #000; padding: 10px; border-radius: 6px;">
                <span style="font-size: 11px; color: #aaa;">轴向:</span>
                <label><input type="radio" name="r-axis" value="X" checked> X 轴</label>
                <label><input type="radio" name="r-axis" value="Y"> Y 轴</label>
                <label><input type="radio" name="r-axis" value="Z"> Z 轴</label>
            </div>
        </div>
        
        <div class="tabs-header">
            <button class="tab-btn active" onclick="switchTab('front')">主视图 (Front)</button>
            <button class="tab-btn" onclick="switchTab('top')">俯视图 (Top)</button>
            <button class="tab-btn" onclick="switchTab('side')">侧视图 (Side)</button>
        </div>
        
        <div style="flex-grow: 1; position: relative;" id="canvas-viewports-wrapper">
            <script>
                const views = ['front', 'top', 'side'];
                views.forEach((v, i) => {
                    document.write(`
                        <div id="tab-${v}" class="tab-content ${i===0?'active':''}">
                            <div class="top-floating-tools">
                                <div class="tool-row">
                                    <div class="mode-switch">
                                        <input type="radio" name="m-${v}" id="ms-${v}" value="select" checked onchange="setMode('${v}', 'select')"><label for="ms-${v}">↖ 选择</label>
                                        <input type="radio" name="m-${v}" id="ml-${v}" value="line" onchange="setMode('${v}', 'line')"><label for="ml-${v}">线段</label>
                                        <input type="radio" name="m-${v}" id="ma-${v}" value="arc" onchange="setMode('${v}', 'arc')"><label for="ma-${v}">弧线</label>
                                        <input type="radio" name="m-${v}" id="mr-${v}" value="rect" onchange="setMode('${v}', 'rect')"><label for="mr-${v}">方形</label>
                                        <input type="radio" name="m-${v}" id="mc-${v}" value="circle" onchange="setMode('${v}', 'circle')"><label for="mc-${v}">圆形</label>
                                        <input type="radio" name="m-${v}" id="me-${v}" value="eraser" onchange="setMode('${v}', 'eraser')"><label for="me-${v}" style="color:#ffcc00">🧽 擦除</label>
                                    </div>
                                    <button class="btn-sec" onclick="toggleMax('${v}')">🔳</button>
                                </div>
                                <div class="tool-row">
                                    <div id="p-rect-${v}" class="param-box" style="display:none">W: <input type="number" id="rw-${v}" value="300" oninput="updateEntityParam('${v}')"> H: <input type="number" id="rh-${v}" value="200" oninput="updateEntityParam('${v}')"></div>
                                    <div id="p-circle-${v}" class="param-box" style="display:none">Rx: <input type="number" id="crx-${v}" value="150" oninput="updateEntityParam('${v}')"> Ry: <input type="number" id="cry-${v}" value="150" oninput="updateEntityParam('${v}')"></div>
                                    <div id="p-dimension-${v}" class="param-box" style="display:none; color:#ff9900">物理尺寸: <input type="number" id="dim-val-${v}" value="100" oninput="updateAIScannedDimension('${v}')"></div>
                                    <div class="param-box">
                                        <button class="btn-sec" onclick="document.getElementById('fi-${v}').click()">📁 导入</button>
                                        <button class="btn-sec" onclick="demoScanCADImg('${v}')" style="color:#ffcc00">✨ AI识图</button>
                                        <input type="file" id="fi-${v}" style="display:none" accept="image/*" onchange="loadImg(event, '${v}')">
                                    </div>
                                </div>
                            </div>
                            <div class="canvas-container" id="container-${v}">
                                <img id="img-${v}" class="bg-img" src="">
                                <canvas id="cv-${v}" class="draw-cv"></canvas>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
        
        <div class="bottom-actions">
            <div style="display: flex; gap: 8px; align-items: center; background: #0a0a0a; padding: 10px; border-radius: 6px;">
                <span style="font-size: 11px; color: #888;">拉伸/特征深度:</span>
                <input type="number" id="depth" value="300" style="flex-grow:1; background:#222; border:1px solid #444; color:#deff9a; padding:6px; outline:none; font-weight:bold;">
                <span style="font-size: 11px;">mm</span>
            </div>
            <button class="btn" onclick="runBuild()">🚀 工业级 3D 实体成型</button>
            <div style="display: flex; justify-content: space-between;">
                <button class="btn-sec" onclick="clearCanvasAll()">🧹 清空当前草图</button>
                <button class="btn-sec" onclick="resetCanvasTransform()">🎯 视窗缩放归零</button>
            </div>
        </div>
    </div>

<div id="center-viewport">
        <div id="toggle-panel-btn" onclick="toggleLeftPanel()">◀</div>
        <div id="view-cube">
            <button class="cube-face" onclick="setCameraView('iso')">等轴测</button>
            <button class="cube-face" onclick="setCameraView('top')">俯视图</button>
            <button class="cube-face" onclick="setCameraView('front')">主视图</button>
            <button class="cube-face" onclick="setCameraView('right')">侧视图</button>
        </div>
        <div id="viewport-hints">[左键] 旋转观察 | [右/中键] 视口平移 | [滚轮] 缩放 | [Shift] 约束2D正交</div>
    </div>

    <div id="right-panel">
        <div class="outliner-header">
            <span class="title">3D 工程管理器</span>
            <div class="history-btns">
                <button onclick="saveProjectToLocal()">💾 存盘</button>
                <button id="btn-undo" onclick="undo3D()">↶</button>
                <button id="btn-redo" onclick="redo3D()">↷</button>
            </div>
        </div>
        
        <details open style="border-bottom: 1px solid #333;">
            <summary>📂 本地工程快照历史</summary>
            <div id="local-projects" style="background:#111; padding:10px; max-height:140px; overflow-y:auto;">
                <div id="project-list-container"></div>
            </div>
        </details>

        <details open style="flex-grow: 1; display: flex; flex-direction: column; border-bottom: 1px solid #333;">
            <summary>🧱 3D 场景零件清单</summary>
            <div class="outliner-list" id="outliner-list"></div>
        </details>

        <details open>
            <summary>⚙️ 二次加工与特征区</summary>
            <div style="background: #151515; padding: 15px;">
                <div style="font-size:11px; color:#aaa; margin-bottom:6px;">基础布尔运算 (请勾选2个及以上):</div>
                <div class="boolean-row">
                    <button class="b-union" onclick="execBoolean('union')">并集 ∪</button>
                    <button class="b-sub" onclick="execBoolean('subtract')">差集 ➖</button>
                    <button class="b-int" onclick="execBoolean('intersect')">交集 ∩</button>
                </div>
                
                <div id="entity-tools" style="display:none; flex-direction:column; gap:10px; margin-top:10px; border-top: 1px solid #333; padding-top: 15px;">
                    <div class="dim-row"><span>物理尺寸:</span> <span>W:<span id="dim-w">0.0</span> H:<span id="dim-h">0.0</span> D:<span id="dim-d">0.0</span></span></div>
                    
                    <div class="tool-row" style="margin-top:5px; display:flex; gap:5px;">
                        <button id="t-translate" class="btn-sec active" style="flex:1" onclick="setTransformMode('translate')">移动句柄</button>
                        <button id="t-rotate" class="btn-sec" style="flex:1" onclick="setTransformMode('rotate')">旋转球</button>
                        <button id="t-scale" class="btn-sec" style="flex:1" onclick="setTransformMode('scale')">缩放框</button>
                    </div>

                    <div class="tool-row" style="display:flex; gap:5px;">
                        <input type="number" id="custom-deg" value="90" style="width:40px; background:#222; color:#deff9a; border:1px solid #555; text-align:center;">
                        <button class="btn-sec" style="flex:1" onclick="rotateSelected('x', null)">+转X</button>
                        <button class="btn-sec" style="flex:1" onclick="rotateSelected('y', null)">+转Y</button>
                        <button class="btn-sec" style="flex:1" onclick="rotateSelected('z', null)">+转Z</button>
                    </div>

                    <div class="tool-row" style="display:flex; gap:5px;">
                        <button class="btn-sec" style="flex:1" onclick="alignEntities('x', 'center')">X居中对齐</button>
                        <button class="btn-sec" style="flex:1" onclick="alignEntities('z', 'center')">Z居中对齐</button>
                        <button class="btn-sec" style="flex:1" onclick="alignEntities('y', 'top')">Y底部齐平</button>
                    </div>
                    
                    <div class="tool-row" style="display:flex; gap:5px;">
                        <button class="btn-sec" style="flex:1" onclick="cloneSelectedPart()">📄 原地复制</button>
                        <button class="btn-sec" style="flex:1" onclick="mirrorSelectedEntity('yz')">左右镜像</button>
                        <button class="btn-sec" style="flex:1" onclick="mirrorSelectedEntity('xz')">上下镜像</button>
                    </div>
                    
                    <button style="width:100%; padding:8px; margin-top:5px; background:#441111; color:#ff8888; border:1px solid #552222; border-radius:4px; cursor:pointer;" onclick="delete3DPart()">🗑 删除选中零件</button>
                </div>
            </div>
        </details>
    </div>

    <script type="module">
        const data = {};
        let entityIdCounter = 0; let partCounter = 0; let selected3DPartId = null;
        const partsList = []; const historyQueue = []; let historyIndex = -1;

        views.forEach(v => { data[v] = { mode: 'select', zoom: 1, panX: 0, panY: 0, entities: [], currentPath: [], selectedId: null, arcState: 0, tempArcEnd: null }; });

        const tCoord = (val) => val - 500; const tCoordY = (val) => 500 - val;

        const viewport = document.getElementById('center-viewport');
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x131315);
        const camera = new THREE.PerspectiveCamera(45, viewport.clientWidth / viewport.clientHeight, 1, 100000); camera.position.set(900, 900, 1300);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false }); renderer.setSize(viewport.clientWidth, viewport.clientHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); viewport.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0x555555)); 
        const dl1 = new THREE.DirectionalLight(0xffffff, 0.75); dl1.position.set(1500, 2500, 1000); scene.add(dl1);
        scene.add(new THREE.GridHelper(4000, 80, 0x333333, 0x1c1c1c)).position.y = -0.5;

        const controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.dampingFactor = 0.05;
        const tControls = new THREE.TransformControls(camera, renderer.domElement); tControls.size = 0.8; scene.add(tControls);
        tControls.addEventListener('dragging-changed', (e) => { controls.enabled = !e.value; if(!e.value) { saveSceneState(); if(selected3DPartId) select3DPart(selected3DPartId); } });

        window.toggleLeftPanel = () => { const lp = document.getElementById('left-panel'); const btn = document.getElementById('toggle-panel-btn'); const collapsed = lp.classList.toggle('collapsed'); btn.innerText = collapsed ? '▶' : '◀'; setTimeout(() => window.dispatchEvent(new Event('resize')), 310); };
        window.switchTab = (tabName) => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); event.target.classList.add('active'); document.getElementById(`tab-${tabName}`).classList.add('active'); renderCanvas(tabName); };
        window.setMode = (v, mode) => { data[v].mode = mode; data[v].currentPath = []; data[v].arcState = 0; document.getElementById(`p-rect-${v}`).style.display = 'none'; document.getElementById(`p-circle-${v}`).style.display = 'none'; document.getElementById(`p-dimension-${v}`).style.display = 'none'; renderCanvas(v); };    

        let dragState = null; let isPanning = false; let startX, startY;

        views.forEach(v => {
            const cv = document.getElementById(`cv-${v}`); const container = document.getElementById(`container-${v}`);
            const getCanvasCoords = (vName, e) => { const rect = cv.getBoundingClientRect(); return { cx: (e.clientX - rect.left - data[vName].panX) / data[vName].zoom, cy: (e.clientY - rect.top - data[vName].panY) / data[vName].zoom }; };
            cv.addEventListener('contextmenu', e => e.preventDefault());

            container.addEventListener('mousedown', (e) => {
                cv.focus();
                if (e.button === 1 || e.button === 2) { isPanning = true; startX = e.clientX; startY = e.clientY; return; }
                if (e.button !== 0 || e.target !== cv) return;

                let { cx, cy } = getCanvasCoords(v, e);
                
                if (data[v].mode === 'select') {
                    const hitId = hitTest(v, cx, cy); data[v].selectedId = hitId;
                    if (hitId !== null) {
                        const ent = data[v].entities.find(en => en.id === hitId);
                        dragState = { ent, startX: cx, startY: cy, origCx: ent.cx, origCy: ent.cy };
                        if (ent.type === 'path') {
                            dragState.origPts = ent.pts.map(p => ({ cx: p.cx, cy: p.cy }));
                            for(let i=0; i<ent.pts.length; i++) { if(Math.hypot(cx - ent.pts[i].cx, cy - ent.pts[i].cy) < 12/data[v].zoom) { dragState.pointIndex = i; break; } }
                        }
                        if(ent.type === 'rect') { document.getElementById(`p-rect-${v}`).style.display = 'flex'; document.getElementById(`rw-${v}`).value = ent.w; document.getElementById(`rh-${v}`).value = ent.h; } 
                        else if(ent.type === 'circle') { document.getElementById(`p-circle-${v}`).style.display = 'flex'; document.getElementById(`crx-${v}`).value = ent.rx !== undefined ? ent.rx : (ent.r || 50); document.getElementById(`cry-${v}`).value = ent.ry !== undefined ? ent.ry : (ent.r || 50);}
                        if(ent.isAIScannedDim) { document.getElementById(`p-dimension-${v}`).style.display = 'flex'; document.getElementById(`dim-val-${v}`).value = ent.scannedValue; }
                    } else { document.getElementById(`p-rect-${v}`).style.display = 'none'; document.getElementById(`p-circle-${v}`).style.display = 'none'; document.getElementById(`p-dimension-${v}`).style.display = 'none'; }
                    renderCanvas(v);
                } 
                else if (data[v].mode === 'eraser') { const hitId = hitTest(v, cx, cy); if(hitId !== null) { data[v].entities = data[v].entities.filter(en => en.id !== hitId); renderCanvas(v); } }
                else {
                    if((data[v].mode === 'line' || data[v].mode === 'arc') && e.shiftKey && data[v].currentPath.length > 0) {
                        const lastP = data[v].currentPath[data[v].currentPath.length - 1]; if (Math.abs(cx - lastP.cx) < Math.abs(cy - lastP.cy)) cx = lastP.cx; else cy = lastP.cy;
                    }
                    if(data[v].mode === 'line') {
                        data[v].currentPath.push({ cx, cy, type: 'line' });
                        if(data[v].currentPath.length > 1 && Math.hypot(cx - data[v].currentPath[0].cx, cy - data[v].currentPath[0].cy) < 15/data[v].zoom) {
                            data[v].currentPath[data[v].currentPath.length - 1] = { cx: data[v].currentPath[0].cx, cy: data[v].currentPath[0].cy, type: 'line' };
                            data[v].entities.push({ id: ++entityIdCounter, type: 'path', pts: data[v].currentPath }); data[v].currentPath = [];
                        }
                    } else if(data[v].mode === 'arc') {
                        if(data[v].arcState === 0) { data[v].currentPath.push({ cx, cy, type: 'line' }); data[v].arcState = 1; }
                        else if(data[v].arcState === 1) { data[v].tempArcEnd = { cx, cy }; data[v].arcState = 2; }
                        else if(data[v].arcState === 2) {
                            data[v].currentPath.push({ cx: data[v].tempArcEnd.cx, cy: data[v].tempArcEnd.cy, type: 'arc', cpx: cx, cpy: cy }); data[v].arcState = 1; data[v].tempArcEnd = null;

                    checked.forEach(part => { scene.remove(part.mesh); partsList.splice(partsList.indexOf(part), 1); }); tControls.detach();
                    const newId = `Part_${++partCounter}`; partsList.push({ id: newId, name: `布尔组件_${newId}`, mesh: newMesh }); scene.add(newMesh); refreshOutliner(); select3DPart(newId); saveSceneState();
                } catch(e) { loadState(safeHistoryIdx); alert("布尔碰撞死锁已拦截，系统自动恢复场景。请将裁切体微调移动 0.05mm 避开绝对共面后再试。"); } finally { document.getElementById('loading').style.display = 'none'; }
            }, 50);
        };

        window.loadImg = (event, v) => { const file = event.target.files[0]; if (file) { const r = new FileReader(); r.onload = (e) => { document.getElementById(`img-${v}`).src = e.target.result; renderCanvas(v); }; r.readAsDataURL(file); } };
        window.addEventListener('paste', (e) => { const activeTab = document.querySelector('.tab-content.active'); if (!activeTab) return; const v = activeTab.id.replace('tab-', ''); const items = e.clipboardData.items; for (let i = 0; i < items.length; i++) { if (items[i].type.indexOf('image') !== -1) { const blob = items[i].getAsFile(); const r = new FileReader(); r.onload = (event) => { document.getElementById(`img-${v}`).src = event.target.result; setTimeout(() => renderCanvas(v), 100); }; r.readAsDataURL(blob); break; } } });
        window.updateAIScannedDimension = (vv) => { const ent = data[vv].entities.find(e => e.id === data[vv].selectedId); if(!ent || !ent.isAIScannedDim || !ent.measuredLength) return; const scaleFactor = (parseFloat(document.getElementById(`dim-val-${vv}`).value) || 100) / ent.measuredLength; data[vv].entities.forEach(otherEnt => { if(otherEnt.scannedFromImg) { otherEnt.cx *= scaleFactor; otherEnt.cy *= scaleFactor; if(otherEnt.w) otherEnt.w *= scaleFactor; if(otherEnt.h) otherEnt.h *= scaleFactor; if(otherEnt.rx) otherEnt.rx *= scaleFactor; if(otherEnt.ry) otherEnt.ry *= scaleFactor; if(otherEnt.pts) otherEnt.pts.forEach(p => { p.cx *= scaleFactor; p.cy *= scaleFactor; }); } }); renderCanvas(vv); };
        window.demoScanCADImg = (v) => { const demoData = [ { type: 'rect', cx: 500, cy: 500, w: 550, h: 350 }, { type: 'circle', cx: 500, cy: 500, rx: 75, ry: 75 }, { type: 'path', cx: 500, cy: 500, pts: [ {cx: 120, cy: 500}, {cx: 880, cy: 500} ] }, { type: 'rect', cx: 500, cy: 220, w: 2, h: 50 }, { type: 'rect', cx: 500, cy: 220, w: 550, h: 2 }, { type: 'circle', cx: 500, cy: 160, rx: 25, ry: 25, isAIScannedDim: true, measuredLength: 550, scannedValue: 220 } ]; data[v].entities = demoData.map(ent => ({ ...ent, id: ++entityIdCounter, scannedFromImg: true })); renderCanvas(v); };

        const saveSceneState = () => { const snap = partsList.map(p => ({ name: p.name, geo: p.mesh.geometry.clone(), mat: p.mesh.material.clone(), pos: p.mesh.position.clone(), rot: p.mesh.rotation.clone(), sc: p.mesh.scale.clone() })); historyQueue.splice(historyIndex + 1); historyQueue.push(snap); historyIndex++; document.getElementById('btn-undo').disabled = historyIndex <= 0; document.getElementById('btn-redo').disabled = historyIndex >= historyQueue.length - 1; };
        const loadState = (idx) => { if(idx < 0 || idx >= historyQueue.length) return; historyIndex = idx; partsList.forEach(p => scene.remove(p.mesh)); partsList.length = 0; historyQueue[idx].forEach(s => { const m = new THREE.Mesh(s.geo.clone(), s.mat.clone()); m.position.copy(s.pos); m.rotation.copy(s.rot); m.scale.copy(s.sc); m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 }))); const newId = `Part_${++partCounter}`; partsList.push({ id: newId, name: s.name, mesh: m }); scene.add(m); }); tControls.detach(); refreshOutliner(); document.getElementById('btn-undo').disabled = historyIndex <= 0; document.getElementById('btn-redo').disabled = historyIndex >= historyQueue.length - 1; };
        window.undo3D = () => loadState(historyIndex - 1); window.redo3D = () => loadState(historyIndex + 1);
        window.saveProjectToLocal = () => { const name = prompt("请输入存档名称:", "APEX_" + new Date().toLocaleTimeString()); if(!name) return; renderer.render(scene, camera); const thumb = renderer.domElement.toDataURL("image/jpeg", 0.4); const pData = { name: name, time: new Date().toLocaleString(), thumb: thumb }; const saved = JSON.parse(localStorage.getItem("APEX_PROJECTS") || "[]"); saved.unshift(pData); localStorage.setItem("APEX_PROJECTS", JSON.stringify(saved.slice(0, 8))); renderProjectList(); };
        window.renderProjectList = () => { const container = document.getElementById('project-list-container'); if(!container) return; const projects = JSON.parse(localStorage.getItem("APEX_PROJECTS") || "[]"); if(projects.length === 0) { container.innerHTML = `<div style="font-size:11px; color:#444; text-align:center; padding:5px;">暂无本地存档记录</div>`; return; } container.innerHTML = projects.map(p => `<div class="outliner-item" style="gap:10px; padding:5px; margin-bottom:4px; align-items:center;"><img src="${p.thumb}" style="width:36px; height:36px; border-radius:4px; border:1px solid #444; object-fit:cover;"><div style="flex:1; overflow:hidden;"><div style="font-size:11px; font-weight:bold; color:#deff9a; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${p.name}</div><div style="font-size:9px; color:#555;">${p.time}</div></div></div>`).join(''); };
        window.setCameraView = (view) => { const bounds = new THREE.Box3(); let hasObj = false; partsList.forEach(p => { bounds.expandByObject(p.mesh); hasObj = true; }); if (!hasObj) bounds.set(new THREE.Vector3(-200,-200,-200), new THREE.Vector3(200,200,200)); const center = new THREE.Vector3(); const size = new THREE.Vector3(); bounds.getCenter(center); bounds.getSize(size); const cameraZ = Math.abs(Math.max(size.x, size.y, size.z) / 2 / Math.tan(camera.fov * (Math.PI / 180) / 2)) * 1.4; controls.target.copy(center); if (view === 'iso') camera.position.set(center.x + cameraZ, center.y + cameraZ, center.z + cameraZ); else if (view === 'top') camera.position.set(center.x, center.y + cameraZ, center.z); else if (view === 'front') camera.position.set(center.x, center.y, center.z + cameraZ); else if (view === 'right') camera.position.set(center.x + cameraZ, center.y, center.z); controls.update(); };
        
        function ani() { requestAnimationFrame(ani); controls.update(); renderer.render(scene, camera); } ani();
        setTimeout(renderProjectList, 1000);
        window.addEventListener('resize', () => { const container = document.getElementById('center-viewport'); camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight); });
    </script>
</body>
