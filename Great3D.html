<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>APEX的工业工具 - 三视图建模引擎</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; display: flex; height: 100vh; background: #121212; color: #fff; }
        #left-panel { width: 420px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .panel-header { padding: 20px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: #222; border-bottom: 1px solid #333; }
        .tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; font-size: 13px; color: #666; transition: 0.2s; }
        .tab.active { color: #deff9a; background: #1a1a1a; border-bottom: 2px solid #deff9a; }
        .tab-content { display: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        .canvas-container { width: 100%; height: 380px; background: #000; border: 1px solid #333; position: relative; margin: 15px 0; display: flex; justify-content: center; align-items: center; border-radius: 8px; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; }
        .bg-img { position: absolute; max-width: 100%; max-height: 100%; opacity: 0.4; pointer-events: none; }
        .btn { background: #deff9a; color: #000; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn:hover { background: #c8f582; }
        .btn-sec { background: #333; color: #ccc; margin-left: 5px; }
        .action-bar { padding: 25px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 12px; }
        #right-panel { flex-grow: 1; position: relative; }
        #loading { position: absolute; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:100; font-weight:bold; color: #deff9a; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
                "three-csg-ts": "https://esm.sh/three-csg-ts@3.1.11?external=three"
            }
        }
    </script>
</head>
<body>
    <div id="left-panel">
        <div class="panel-header">
            <h3 style="margin:0; font-size:16px; color:#deff9a">APEX 3D ENGINE</h3>
            <a href="index.html" style="color:#666; text-decoration:none; font-size:12px">← BACK</a>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('front')">主视 (XY)</div>
            <div class="tab" onclick="switchTab('top')">俯视 (XZ)</div>
            <div class="tab" onclick="switchTab('side')">侧视 (YZ)</div>
        </div>
        <div id="tab-front" class="tab-content active">
            <div style="display:flex; gap:8px">
                <button class="btn" onclick="document.getElementById('up-front').click()">导入底图</button>
                <input type="file" id="up-front" hidden onchange="loadImg(event, 'front')">
                <button class="btn btn-sec" onclick="resetView('front')">重置描点</button>
                <button class="btn btn-sec" onclick="closePath('front')">闭合路径</button>
            </div>
            <div class="canvas-container"><img id="img-front" class="bg-img"><canvas id="cv-front" width="380" height="380"></canvas></div>
            <p style="font-size:11px; color:#555">主视图决定了模型的正向轮廓。</p>
        </div>
        <div id="tab-top" class="tab-content">
            <div style="display:flex; gap:8px">
                <button class="btn" onclick="document.getElementById('up-top').click()">导入底图</button>
                <input type="file" id="up-top" hidden onchange="loadImg(event, 'top')">
                <button class="btn btn-sec" onclick="resetView('top')">重置描点</button>
                <button class="btn btn-sec" onclick="closePath('top')">闭合路径</button>
            </div>
            <div class="canvas-container"><img id="img-top" class="bg-img"><canvas id="cv-top" width="380" height="380"></canvas></div>
        </div>
        <div id="tab-side" class="tab-content">
            <div style="display:flex; gap:8px">
                <button class="btn" onclick="document.getElementById('up-side').click()">导入底图</button>
                <input type="file" id="up-side" hidden onchange="loadImg(event, 'side')">
                <button class="btn btn-sec" onclick="resetView('side')">重置描点</button>
                <button class="btn btn-sec" onclick="closePath('side')">闭合路径</button>
            </div>
            <div class="canvas-container"><img id="img-side" class="bg-img"><canvas id="cv-side" width="380" height="380"></canvas></div>
        </div>
        <div class="action-bar">
            <div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; color:#888">
                拉伸深度: <input type="number" id="depth" value="600" style="background:#000; color:#deff9a; border:1px solid #333; padding:5px; width:60px">
            </div>
            <button class="btn" style="padding:15px" onclick="runBuild()">执行布尔交集运算</button>
            <button class="btn btn-sec" style="padding:12px" onclick="exportSTL()">导出 STL 模型</button>
        </div>
    </div>
    <div id="right-panel"><div id="loading">COMPUTING...</div><div id="viewport" style="width:100%; height:100%"></div></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';
        import { CSG } from 'three-csg-ts';

        const views = ['front', 'top', 'side'];
        const data = { front: { pts: [], done: false }, top: { pts: [], done: false }, side: { pts: [], done: false } };

        // 交互逻辑
        window.switchTab = (v) => {
            document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${v}')"]`).classList.add('active');
            document.getElementById(`tab-${v}`).classList.add('active');
        };

        window.loadImg = (e, v) => {
            const f = e.target.files[0];
            if(f) { const r = new FileReader(); r.onload = (ev) => document.getElementById(`img-${v}`).src = ev.target.result; r.readAsDataURL(f); }
        };

        // ================= 剪贴板图片粘贴接管 =================
        // 处理图片 Blob 的通用函数
        const handleImageBlob = (blob, viewName) => {
            const url = URL.createObjectURL(blob);
            const img = document.getElementById(`img-${viewName}`);
            img.src = url;
            img.style.display = 'block'; // 确保图片显示
        };

        // 获取当前正在操作的视图 (front, top, side)
        const getActiveView = () => {
            if(document.getElementById('tab-front').classList.contains('active')) return 'front';
            if(document.getElementById('tab-top').classList.contains('active')) return 'top';
            return 'side';
        };

        // 1. 监听全局 Ctrl+V 粘贴
        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    handleImageBlob(blob, getActiveView());
                    e.preventDefault();
                    break;
                }
            }
        });

        // 2. 监听画布区域右键点击读取剪贴板 (利用 Async Clipboard API)
        views.forEach(v => {
            const canvasContainer = document.getElementById(`cv-${v}`).parentElement;
            canvasContainer.addEventListener('contextmenu', async (e) => {
                e.preventDefault(); // 阻止浏览器默认右键菜单
                try {
                    // 请求读取剪贴板权限并获取内容
                    const clipboardItems = await navigator.clipboard.read();
                    for (const clipboardItem of clipboardItems) {
                        const imageTypes = clipboardItem.types.filter(type => type.startsWith('image/'));
                        if (imageTypes.length > 0) {
                            const blob = await clipboardItem.getType(imageTypes[0]);
                            handleImageBlob(blob, v);
                            return; 
                        }
                    }
                    console.log("剪贴板中没有找到图片");
                } catch (err) {
                    console.error("读取剪贴板失败:", err);
                    alert("无法读取剪贴板。请确保您已在浏览器中允许该网页读取剪贴板权限，或者直接使用快捷键 Ctrl+V 进行粘贴。");
                }
            });
        });
        // =======================================================
        
        views.forEach(v => {
            const cv = document.getElementById(`cv-${v}`);
            const ctx = cv.getContext('2d');
            const render = () => {
                ctx.clearRect(0,0,380,380);
                // 辅助网格
                ctx.strokeStyle = '#222'; ctx.beginPath(); 
                for(let i=0;i<=380;i+=20){ ctx.moveTo(i,0);ctx.lineTo(i,380);ctx.moveTo(0,i);ctx.lineTo(380,i); } ctx.stroke();
                // 轴
                ctx.strokeStyle = '#444'; ctx.beginPath(); ctx.moveTo(190,0);ctx.lineTo(190,380);ctx.moveTo(0,190);ctx.lineTo(380,190); ctx.stroke();
                
                if(data[v].pts.length > 0) {
                    ctx.strokeStyle = '#deff9a'; ctx.lineWidth = 2; ctx.beginPath();
                    ctx.moveTo(data[v].pts[0].cx, data[v].pts[0].cy);
                    data[v].pts.forEach(p => ctx.lineTo(p.cx, p.cy));
                    if(data[v].done) { ctx.closePath(); ctx.fillStyle = 'rgba(222,255,154,0.1)'; ctx.fill(); }
                    ctx.stroke();
                    data[v].pts.forEach(p => { ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(p.cx, p.cy, 3, 0, Math.PI*2); ctx.fill(); });
                }
            };
            cv.onclick = (e) => {
                if(data[v].done) return;
                const r = cv.getBoundingClientRect();
                const cx = e.clientX - r.left, cy = e.clientY - r.top;
                data[v].pts.push({ cx, cy, x: cx - 190, y: 190 - cy });
                render();
            };
            window[`resetView` + v] = () => { data[v].pts = []; data[v].done = false; render(); }; // 简化
            window.resetView = (vv) => { data[vv].pts = []; data[vv].done = false; render(); };
            window.closePath = (vv) => { data[vv].done = true; render(); };
            render();
        });

        // 3D 渲染引擎
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0d0d0d);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 5000);
        camera.position.set(400, 400, 400);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(document.getElementById('viewport').clientWidth, document.getElementById('viewport').clientHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7), new THREE.GridHelper(1000, 50, 0x222222, 0x111111));
        const light = new THREE.DirectionalLight(0xffffff, 0.8); light.position.set(200, 500, 200); scene.add(light);

        let mesh = null;
        window.runBuild = () => {
            if(!data.front.done || !data.top.done || !data.side.done) return alert("请闭合所有视图路径！");
            document.getElementById('loading').style.display = 'flex';
            setTimeout(() => {
                try {
                    if(mesh) scene.remove(mesh);
                    const d = parseFloat(document.getElementById('depth').value);
                    const make = (pts) => {
                        const s = new THREE.Shape(pts.map(p => new THREE.Vector2(p.x, p.y)));
                        const g = new THREE.ExtrudeGeometry(s, { depth: d, bevelEnabled: false });
                        g.translate(0,0,-d/2); return new THREE.Mesh(g);
                    };
                    const mF = make(data.front.pts), mT = make(data.top.pts), mS = make(data.side.pts);
                    mT.rotation.x = Math.PI/2; mS.rotation.y = Math.PI/2;
                    [mF, mT, mS].forEach(m => m.updateMatrix());
                    let res = CSG.fromMesh(mF).intersect(CSG.fromMesh(mT));
                    res = res.intersect(CSG.fromMesh(mS));
                    mesh = CSG.toMesh(res, new THREE.Matrix4(), new THREE.MeshStandardMaterial({ color: 0xdeff9a, roughness: 0.3, metalness: 0.5, side: THREE.DoubleSide }));
                    const edge = new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 }));
                    mesh.add(edge); scene.add(mesh);
                } catch(e) { console.error(e); alert("生成失败，请检查点位。"); }
                document.getElementById('loading').style.display = 'none';
            }, 100);
        };

        window.exportSTL = () => {
            if(!mesh) return alert("请先生成模型");
            const blob = new Blob([new STLExporter().parse(mesh)], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `APEX_MODEL_${Date.now()}.stl`; a.click();
        };

        function ani() { requestAnimationFrame(ani); controls.update(); renderer.render(scene, camera); }
        ani();
        window.onresize = () => {
            const w = document.getElementById('viewport').clientWidth, h = document.getElementById('viewport').clientHeight;
            camera.aspect = w/h; camera.updateProjectionMatrix(); renderer.setSize(w, h);
        };
    </script>
</body>
</html>
